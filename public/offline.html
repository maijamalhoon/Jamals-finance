<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5" />
    <meta name="theme-color" content="#f3f6fa" />
    <title>Offline | Jamal's Finance</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f6fa;
        --surface: #ffffff;
        --surface-soft: #eef2f7;
        --border: #d7e0ea;
        --text: #17233a;
        --muted: #66768a;
        --accent: #3563e9;
        --accent-text: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0c1422;
          --surface: #142036;
          --surface-soft: #19263b;
          --border: #2d3d56;
          --text: #edf3fb;
          --muted: #9aa9bd;
          --accent: #9fb1ff;
          --accent-text: #0c1422;
        }
      }

      * { box-sizing: border-box; }

      html,
      body { min-height: 100%; }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "Geist Sans", Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-kerning: normal;
        font-optical-sizing: auto;
        font-synthesis: none;
        text-rendering: geometricPrecision;
      }

      svg {
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.35;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
        shape-rendering: geometricPrecision;
      }

      header {
        width: min(100%, 960px);
        min-height: 64px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .brand-mark,
      .icon {
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--accent);
      }

      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 11px;
      }

      .brand-mark svg { width: 20px; height: 20px; }

      main {
        width: 100%;
        min-height: calc(100dvh - 64px);
        flex: 1;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(100%, 440px);
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
      }

      .icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: var(--surface-soft);
      }

      .icon svg { width: 24px; height: 24px; }

      h1 {
        margin: 18px 0 8px;
        font-size: clamp(28px, 7vw, 36px);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1.08;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        font-weight: 450;
        line-height: 1.6;
        letter-spacing: -0.01em;
      }

      button {
        width: 100%;
        min-height: 48px;
        margin-top: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        border: 0;
        border-radius: 12px;
        background: var(--accent);
        color: var(--accent-text);
        font: inherit;
        font-size: 14px;
        font-weight: 650;
        cursor: pointer;
      }

      button:hover { filter: brightness(1.04); }
      button:focus-visible { outline: 3px solid color-mix(in srgb, var(--accent) 28%, transparent); outline-offset: 3px; }
      button svg { width: 18px; height: 18px; }

      @media (max-width: 600px) {
        header {
          min-height: 56px;
          padding: 0 14px;
        }

        main {
          min-height: calc(100dvh - 56px);
          padding: 12px;
        }

        .card {
          padding: 20px;
          border-radius: 16px;
          box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
        }
      }

      @media (max-height: 560px) {
        header { min-height: 52px; }
        main { min-height: calc(100dvh - 52px); padding: 8px 12px; }
        .card { padding: 16px 18px; }
        .icon { width: 42px; height: 42px; }
        h1 { margin-top: 12px; font-size: 26px; }
        p { font-size: 13px; line-height: 1.45; }
        button { min-height: 44px; margin-top: 14px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8" />
            <path d="M12 18V6" />
          </svg>
        </span>
        <span>Jamal's Finance</span>
      </div>
    </header>

    <main>
      <section class="card">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 20h.01" />
            <path d="M8.5 16.43a5 5 0 0 1 7 0" />
            <path d="M5 12.86a10 10 0 0 1 5.17-2.69" />
            <path d="M19 12.86a10 10 0 0 0-2.01-1.52" />
            <path d="M2 8.82a15 15 0 0 1 4.18-2.64" />
            <path d="M22 8.82a15 15 0 0 0-11.29-3.76" />
            <path d="m2 2 20 20" />
          </svg>
        </span>

        <h1>You are offline</h1>
        <p>Reconnect to continue securely and load your latest finance data.</p>

        <button type="button" onclick="window.location.reload()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-15.22 6.48L3 16" />
            <path d="M3 21v-5h5" />
            <path d="M3 12A9 9 0 0 1 18.22 5.52L21 8" />
            <path d="M21 3v5h-5" />
          </svg>
          Try again
        </button>
      </section>
    </main>
  </body>
</html>
