<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5" />
    <meta name="theme-color" content="#f3f6fa" />
    <title>Offline | JALVORO</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f6fa;
        --surface: #ffffff;
        --surface-soft: #eef2f7;
        --border: #d7e0ea;
        --text: #17233a;
        --muted: #66768a;
        --accent: #07365f;
        --accent-text: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0c1422;
          --surface: #142036;
          --surface-soft: #19263b;
          --border: #2d3d56;
          --text: #edf3fb;
          --muted: #9aa9bd;
          --accent: #9fdcff;
          --accent-text: #0c1422;
        }
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
        font-family: Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-rendering: geometricPrecision;
      }

      header {
        width: min(100%, 960px);
        min-height: 64px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .brand-mark, .icon {
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface-soft);
        color: var(--accent);
      }

      .brand-mark { width: 36px; height: 36px; }
      .brand-mark svg { width: 22px; height: 22px; }

      main {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(100%, 440px);
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
      }

      .icon { width: 48px; height: 48px; }
      .icon svg { width: 24px; height: 24px; }

      svg {
        fill: none;
        stroke: currentColor;
        stroke-width: 2.35;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: clamp(28px, 7vw, 36px);
        letter-spacing: -0.04em;
        line-height: 1.08;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      button {
        width: 100%;
        min-height: 48px;
        margin-top: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        border: 0;
        border-radius: 12px;
        background: var(--accent);
        color: var(--accent-text);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:focus-visible { outline: 3px solid color-mix(in srgb, var(--accent) 28%, transparent); outline-offset: 3px; }
      button svg { width: 18px; height: 18px; }

      @media (max-width: 600px) {
        header { min-height: 56px; padding: 0 14px; }
        main { padding: 12px; }
        .card { padding: 20px; border-radius: 16px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M6 5v7c0 4 2.2 7 6 7s6-3 6-7V5" />
            <path d="m8 11 4 4 4-4" />
          </svg>
        </span>
        <span>JALVORO</span>
      </div>
    </header>

    <main>
      <section class="card">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 20h.01" />
            <path d="M8.5 16.43a5 5 0 0 1 7 0" />
            <path d="M5 12.86a10 10 0 0 1 5.17-2.69" />
            <path d="M19 12.86a10 10 0 0 0-2.01-1.52" />
            <path d="m2 2 20 20" />
          </svg>
        </span>

        <h1>You are offline</h1>
        <p>Reconnect to continue securely and load the latest data for your workspace.</p>

        <button type="button" onclick="window.location.reload()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-15.22 6.48L3 16" />
            <path d="M3 21v-5h5" />
            <path d="M3 12A9 9 0 0 1 18.22 5.52L21 8" />
            <path d="M21 3v5h-5" />
          </svg>
          Try again
        </button>
      </section>
    </main>
  </body>
</html>
