<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#F3F6FA" />
    <title>Offline | Jamal's Finance</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f6fa;
        --card: #ffffff;
        --border: #d4deea;
        --text: #17233a;
        --muted: #607187;
        --accent: #2956c8;
        --accent-hover: #2147ac;
        --accent-soft: #e7edff;
        --button-text: #ffffff;
        --shadow: 0 18px 48px rgba(23, 35, 58, 0.12);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0c1422;
          --card: #152136;
          --border: #2b3b55;
          --text: #edf3fb;
          --muted: #94a4ba;
          --accent: #9bb0ff;
          --accent-hover: #b0c0ff;
          --accent-soft: #202e4e;
          --button-text: #0c1422;
          --shadow: 0 24px 58px rgba(0, 0, 0, 0.38);
        }
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: "Geist Sans", Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 480px);
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--card);
        padding: 28px;
        box-shadow: var(--shadow);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid color-mix(in srgb, var(--accent), transparent 68%);
        border-radius: 999px;
        padding: 8px 12px;
        color: var(--accent);
        background: var(--accent-soft);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 22px 0 10px;
        font-size: clamp(30px, 7vw, 46px);
        letter-spacing: -0.05em;
        line-height: 0.98;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      button {
        width: 100%;
        margin-top: 24px;
        border: 0;
        border-radius: 12px;
        padding: 14px 18px;
        color: var(--button-text);
        background: var(--accent);
        font-weight: 700;
        cursor: pointer;
      }

      button:hover { background: var(--accent-hover); }

      button:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--accent), transparent 34%);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Offline mode</span>
      <h1>You are offline</h1>
      <p>
        Jamal's Finance needs internet for secure login and fresh finance data.
        Reconnect and try again.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
