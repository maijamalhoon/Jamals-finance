<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#090c11" />
    <title>Offline | Jamal's Finance</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090c11;
        --card: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.14);
        --text: #f8fafc;
        --muted: #a8b3c7;
        --accent: #5eead4;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(94, 234, 212, 0.16), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.14), transparent 30rem),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 480px);
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(18px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(94, 234, 212, 0.28);
        border-radius: 999px;
        padding: 8px 12px;
        color: var(--accent);
        background: rgba(94, 234, 212, 0.08);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 22px 0 10px;
        font-size: clamp(30px, 7vw, 46px);
        letter-spacing: -0.05em;
        line-height: 0.98;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      button {
        width: 100%;
        margin-top: 24px;
        border: 0;
        border-radius: 16px;
        padding: 14px 18px;
        color: #061014;
        background: linear-gradient(135deg, #5eead4, #93c5fd);
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Offline mode</span>
      <h1>You are offline</h1>
      <p>
        Jamal's Finance needs internet for secure login and fresh finance data.
        Reconnect and try again.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
