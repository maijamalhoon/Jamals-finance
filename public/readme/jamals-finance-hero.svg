    <rect y="28" width="770" height="26" fill="#17263a"/>
    <circle cx="28" cy="27" r="6" fill="#ff7e86"/>
    <circle cx="50" cy="27" r="6" fill="#f3c963"/>
    <circle cx="72" cy="27" r="6" fill="#6fd39d"/>
    <rect x="104" y="16" width="362" height="22" rx="11" fill="#0e1b2b"/>

