      <rect x="18" y="18" width="134" height="44" rx="14" fill="#1e3249"/>
      <circle cx="40" cy="40" r="11" fill="#d8b45d"/>
      <rect x="60" y="31" width="70" height="8" rx="4" fill="#e7edf5"/>
