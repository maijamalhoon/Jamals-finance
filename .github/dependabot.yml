version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Karachi
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    rebase-strategy: auto

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "09:30"
      timezone: Asia/Karachi
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
    rebase-strategy: auto
