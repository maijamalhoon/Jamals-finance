name: Bug report
description: Report a reproducible product defect without including private financial data.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Jamal's Finance. Remove account details, credentials, tokens, and real financial records before submitting.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and why it is incorrect.
      placeholder: A concise description of the defect.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use non-sensitive test data only.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device class
      options:
        - Mobile
        - Tablet
        - Laptop or desktop
        - Multiple device classes
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 140, Safari 20, etc.
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - System
        - Light
        - Dark
        - Not applicable
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Add screenshots or logs only after removing sensitive information.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, tokens, personal data, and real financial records.
          required: true
        - label: I searched existing issues and pull requests for the same problem.
          required: true
