name: Telemetry focused validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  telemetry-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
      NEXT_PUBLIC_TELEMETRY_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install dependencies
        run: npm ci --silent

      - name: Run telemetry contract tests
        id: telemetry_tests
        shell: bash
        run: |
          set +e
          npx vitest run lib/telemetry/schema.test.ts > telemetry-tests.log 2>&1
          exit_code=$?
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload telemetry validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-focused-validation
          path: telemetry-tests.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve telemetry test result
        if: steps.telemetry_tests.outputs.exit_code != '0'
        run: exit 1
