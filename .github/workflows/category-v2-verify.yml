name: Category manager v2 verification

on:
  push:
    branches:
      - feat/category-manager-v2-direct
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run typecheck and capture output
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/category-v2-typecheck.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run complete tests and capture output
        id: tests
        shell: bash
        run: |
          set +e
          npm test > /tmp/category-v2-tests.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Run build and capture output
        id: build
        shell: bash
        run: |
          set +e
          npm run build > /tmp/category-v2-build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload verification logs
        uses: actions/upload-artifact@v4
        with:
          name: category-v2-verification-logs
          path: |
            /tmp/category-v2-typecheck.log
            /tmp/category-v2-tests.log
            /tmp/category-v2-build.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce verification result
        run: |
          test "${{ steps.typecheck.outputs.status }}" = "0"
          test "${{ steps.tests.outputs.status }}" = "0"
          test "${{ steps.build.outputs.status }}" = "0"
