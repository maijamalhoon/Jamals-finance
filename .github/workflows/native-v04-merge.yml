name: Native v0.4 Main Integration

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/native-v04-merge.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Squash verified native branch onto main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main native-investments-analytics-v0.4
          git merge --squash origin/native-investments-analytics-v0.4
          rm -rf .github/native-bootstrap-v04
          rm -f .github/native-v04-status.json .github/native-v04-log.txt
          rm -f .github/workflows/native-v04-bootstrap.yml
          rm -f .github/workflows/native-v04-verify.yml
          rm -f .github/workflows/native-v04-merge.yml

          python - <<'PY'
          from pathlib import Path
          path = Path("native/README.md")
          text = path.read_text(encoding="utf-8")
          text = text.replace("## Current milestone: v0.3.0", "## Current milestone: v0.4.0")
          marker = "- Payables: create, edit, delete, payment recording, repayment history and due status\n"
          additions = (
              "- Investments: load, search, create, edit, delete, cash out and aggregate repeated purchases\n"
              "- Live investment prices for supported crypto, stock and forex assets with safe manual fallback\n"
              "- Analytics: aligned date presets, previous-period comparisons, refunds, cash flow, categories, accounts and portfolio metrics\n"
          )
          if additions not in text:
              text = text.replace(marker, marker + additions)
          text = text.replace(
              "Investments, analytics, reports, AI, business modules, notifications, remaining platform integrations, release hardening and dedicated visual-parity work remain future milestones.",
              "Reports, AI, business modules, notifications, remaining platform integrations, release hardening and dedicated visual-parity work remain future milestones.",
          )
          path.write_text(text, encoding="utf-8")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(native): release investments and analytics milestone"
          git pull --rebase origin main
          git push origin HEAD:main

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Run final main shared tests and Android build
        id: build
        shell: bash
        working-directory: native
        run: |
          set +e
          gradle :shared:testAndroidHostTest :androidApp:assembleDebug --stacktrace 2>&1 | tee /tmp/native-v04-main-build.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload final main v0.4 debug APK
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-native-investments-analytics-v0.4.0-main-debug
          path: native/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Record final main verification
        if: always()
        env:
          BUILD_EXIT_CODE: ${{ steps.build.outputs.exit_code }}
        run: |
          if [ "${BUILD_EXIT_CODE}" = "0" ]; then result="success"; else result="failure"; fi
          cat > .github/native-v04-main-status.json <<JSON
          {
            "status": "${result}",
            "runId": "${GITHUB_RUN_ID}",
            "commit": "$(git rev-parse HEAD)",
            "workflow": "native-v04-main-integration"
          }
          JSON
          {
            echo "=== ACTIONABLE LINES ==="
            grep -n -E "(^e: |FAILURE:|What went wrong:|Unresolved reference|Cannot|error:)" /tmp/native-v04-main-build.log | head -n 180 || true
            echo
            echo "=== FINAL 120 LINES ==="
            tail -n 120 /tmp/native-v04-main-build.log || true
          } > .github/native-v04-main-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/native-v04-main-status.json .github/native-v04-main-log.txt
          git commit -m "chore(native): record v0.4 main verification ${result}" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Fail when final main build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
