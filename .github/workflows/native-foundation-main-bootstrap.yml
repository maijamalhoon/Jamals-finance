name: Generate native foundation once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/native-foundation-main-bootstrap.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Extract reviewed native foundation package
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            "https://raw.githubusercontent.com/maijamalhoon/Jamals-finance/native-foundation-bootstrap/.github/workflows/native-foundation-bootstrap.yml" \
            --output /tmp/bootstrap-source.yml
          awk '/^PAYLOAD$/{capture=!capture; next} capture' /tmp/bootstrap-source.yml > /tmp/native-bootstrap.b64
          test -s /tmp/native-bootstrap.b64
          base64 --decode /tmp/native-bootstrap.b64 > /tmp/native-bootstrap.tar.gz
          tar -xzf /tmp/native-bootstrap.tar.gz -C "$GITHUB_WORKSPACE"
          rm -f .github/workflows/native-foundation-main-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native .github/workflows/native-foundation-ci.yml .github/workflows/native-foundation-main-bootstrap.yml
          git commit -m "feat(native): add Kotlin Multiplatform foundation"
          git pull --rebase origin main
          git push origin HEAD:main
