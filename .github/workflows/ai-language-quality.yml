name: AI language quality verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: false
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint changed AI and language files
        run: >-
          npx eslint
          app/api/ai-insights/chat/route.ts
          app/api/ai-insights/exact/route.ts
          app/layout.tsx
          components/i18n/LanguageProvider.tsx
          components/settings/SettingsPreferencesSection.tsx
          lib/ai/localized-finance-answer.ts
          lib/ai/localized-finance-answer.test.ts
          lib/ai/multilingual-finance-normalizer.ts
          lib/ai/multilingual-finance-normalizer.test.ts
          lib/i18n/config.ts
          lib/i18n/config.test.ts
          lib/i18n/request-language.ts

      - name: Check changed files for TypeScript errors
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.txt 2>&1
          status=$?
          set -e
          if grep -E "(app/api/ai-insights/(chat|exact)/route|components/i18n/LanguageProvider|components/settings/SettingsPreferencesSection|lib/(ai|i18n)/)" typecheck.txt; then
            echo "TypeScript errors found in changed AI/language files."
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
            echo "Repository baseline has unrelated TypeScript errors; no changed AI/language file is implicated."
          fi

      - name: Capture focused AI and language tests
        id: focused-tests
        shell: bash
        run: |
          set +e
          npx vitest run \
            lib/i18n/config.test.ts \
            lib/ai/multilingual-finance-normalizer.test.ts \
            lib/ai/localized-finance-answer.test.ts \
            > focused-tests.txt 2>&1
          status=$?
          cat focused-tests.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload focused test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ai-language-focused-tests
          path: focused-tests.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce focused test result
        if: steps.focused-tests.outputs.status != '0'
        run: exit 1
