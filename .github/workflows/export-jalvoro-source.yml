name: Export JALVORO source

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    name: Package validated production source
    if: github.head_ref == 'agent/deploy-jalvoro-production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          show-progress: false

      - name: Remove temporary deployment workflows
        shell: bash
        run: |
          rm -f .github/workflows/deploy-jalvoro-production.yml
          rm -f .github/workflows/export-jalvoro-source.yml
          rm -rf .git

      - name: Upload validated source
        uses: actions/upload-artifact@v4
        with:
          name: jalvoro-production-source
          path: .
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
