name: Export JALVORO source

on:
  push:
    branches:
      - agent/deploy-jalvoro-production

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4504a0b2a599ade9c15e478e7183a993
        with:
          persist-credentials: false
          show-progress: false

      - name: Remove temporary deployment workflows
        shell: bash
        run: |
          rm -f .github/workflows/deploy-jalvoro-production.yml
          rm -f .github/workflows/export-jalvoro-source.yml
          rm -rf .git

      - name: Upload validated source
        uses: actions/upload-artifact@v4
        with:
          name: jalvoro-production-source
          path: .
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
