name: Android v1.0.2 Marker Icon Build

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/android-v1.0.2-icon-build.yml"

permissions:
  contents: write

jobs:
  build-android-update:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report build start
        run: |
          cat > android-twa/release-handoff-v1.0.2.json <<JSON
          {
            "status": "started",
            "runId": "${GITHUB_RUN_ID}",
            "artifactName": "jamals-finance-android-v1.0.2-unsigned",
            "sourceCommit": "${GITHUB_SHA}"
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-twa/release-handoff-v1.0.2.json
          git commit -m "chore(android): record v1.0.2 build start" || true
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify unsigned Android package
        id: package
        shell: bash
        run: |
          set -u
          mkdir -p diagnostics handoff rendered-icons
          exec > >(tee diagnostics/build.log) 2>&1

          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

          curl --fail --location --silent --show-error \
            "https://pwabuilder-cloudapk.azurewebsites.net/downloadPackageZip?id=googleplaypackagejob%3Ajamals-finance-sable.vercel.app%3A008936" \
            --output source-package.zip
          unzip -q source-package.zip -d package

          source_dir="$(find package -type f -path '*/app/build.gradle' -printf '%h\n' | sed 's#/app$##' | head -n 1)"
          test -n "$source_dir"
          build_file="$source_dir/app/build.gradle"
          icon_svg="$GITHUB_WORKSPACE/public/icons/icon.svg"
          test -s "$icon_svg"

          sed -i 's/targetSdkVersion 35/targetSdkVersion 36/' "$build_file"
          sed -i 's/versionCode 1/versionCode 3/' "$build_file"
          sed -i 's/versionName "1.0.0.0"/versionName "1.0.2"/' "$build_file"
          sed -i "s#launchUrl: '/?source=twa'#launchUrl: '/?source=twa\&appVersion=1.0.2'#" "$build_file"
          sed -i "s/themeColor: '#2956C8'/themeColor: '#07365F'/" "$build_file"
          sed -i "s/themeColorDark: '#2956C8'/themeColorDark: '#03132F'/" "$build_file"

          grep -q 'compileSdkVersion 36' "$build_file"
          grep -q 'targetSdkVersion 36' "$build_file"
          grep -q 'versionCode 3' "$build_file"
          grep -q 'versionName "1.0.2"' "$build_file"
          grep -q 'appVersion=1.0.2' "$build_file"

          if command -v magick >/dev/null 2>&1; then
            IMG=magick
          elif command -v convert >/dev/null 2>&1; then
            IMG=convert
          else
            sudo apt-get update
            sudo apt-get install -y imagemagick
            IMG=convert
          fi

          render_square() {
            local size="$1"
            local output="$2"
            "$IMG" -background none "$icon_svg" -resize "${size}x${size}" "$output"
          }

          declare -A launcher_sizes=(
            [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192
          )
          declare -A maskable_sizes=(
            [mdpi]=82 [hdpi]=123 [xhdpi]=164 [xxhdpi]=246 [xxxhdpi]=328
          )
          declare -A splash_sizes=(
            [mdpi]=300 [hdpi]=450 [xhdpi]=600 [xxhdpi]=900 [xxxhdpi]=1200
          )

          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            launcher="$source_dir/app/src/main/res/mipmap-${density}/ic_launcher.png"
            maskable="$source_dir/app/src/main/res/mipmap-${density}/ic_maskable.png"
            splash="$source_dir/app/src/main/res/drawable-${density}/splash.png"

            render_square "${launcher_sizes[$density]}" "$launcher"
            render_square "${maskable_sizes[$density]}" "$maskable"

            canvas="${splash_sizes[$density]}"
            icon_size=$(( canvas * 62 / 100 ))
            temp_icon="rendered-icons/splash-${density}-icon.png"
            render_square "$icon_size" "$temp_icon"
            "$IMG" -size "${canvas}x${canvas}" canvas:'#F3F6FA' \
              "$temp_icon" -gravity center -composite "$splash"
          done

          store_icon="$(find "$source_dir" -maxdepth 2 -type f -name 'store_icon.png' | head -n 1 || true)"
          if [ -n "$store_icon" ]; then
            render_square 512 "$store_icon"
          fi

          cd "$source_dir"
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-daemon --stacktrace
          cd "$GITHUB_WORKSPACE"

          apk="$(find "$source_dir/app/build/outputs/apk/release" -type f -name '*release*.apk' | head -n 1)"
          aab="$(find "$source_dir/app/build/outputs/bundle/release" -type f -name '*release*.aab' | head -n 1)"
          test -s "$apk"
          test -s "$aab"

          "$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$apk" > diagnostics/apk-badging.txt
          grep -q "package: name='com.jamalsfinance.app' versionCode='3' versionName='1.0.2'" diagnostics/apk-badging.txt
          grep -q "sdkVersion:'23'" diagnostics/apk-badging.txt
          grep -q "targetSdkVersion:'36'" diagnostics/apk-badging.txt

          cp "$apk" handoff/jamals-finance-v1.0.2-unsigned.apk
          cp "$aab" handoff/jamals-finance-v1.0.2-unsigned.aab
          cp diagnostics/apk-badging.txt handoff/
          cp "$icon_svg" handoff/marker-finance-icon.svg
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned Android update
        if: steps.package.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-android-v1.0.2-unsigned
          path: handoff/
          if-no-files-found: error
          retention-days: 1

      - name: Upload build diagnostics
        if: steps.package.outputs.success != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-android-v1.0.2-diagnostics
          path: diagnostics/
          retention-days: 1

      - name: Report final build status
        if: always()
        env:
          BUILD_OK: ${{ steps.package.outputs.success }}
        run: |
          if [ "$BUILD_OK" = "true" ]; then status="completed"; else status="failed"; fi
          cat > android-twa/release-handoff-v1.0.2.json <<JSON
          {
            "status": "${status}",
            "runId": "${GITHUB_RUN_ID}",
            "artifactName": "jamals-finance-android-v1.0.2-unsigned",
            "sourceCommit": "${GITHUB_SHA}"
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-twa/release-handoff-v1.0.2.json
          git commit -m "chore(android): record v1.0.2 build status" || true
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Fail workflow when build failed
        if: steps.package.outputs.success != 'true'
        run: exit 1
