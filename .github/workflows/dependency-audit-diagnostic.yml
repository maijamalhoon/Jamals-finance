name: Dependency audit diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install dependencies
        run: npm ci --silent

      - name: Print dependency audit details
        shell: bash
        run: |
          set +e
          npm audit --json > audit.json
          node <<'NODE'
          const fs = require('node:fs');
          const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
          console.log('AUDIT_METADATA=' + JSON.stringify(audit.metadata || {}));
          for (const [name, item] of Object.entries(audit.vulnerabilities || {})) {
            console.log('AUDIT_ITEM=' + JSON.stringify({
              name,
              severity: item.severity,
              direct: item.isDirect,
              range: item.range,
              via: item.via,
              effects: item.effects,
              fixAvailable: item.fixAvailable,
              nodes: item.nodes,
            }));
          }
          NODE
          exit 0
