name: Dependency audit diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Regenerate and safely repair lockfile
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts
          npm audit fix --package-lock-only --ignore-scripts || true
          npm install --package-lock-only --ignore-scripts

      - name: Install repaired dependency graph
        run: npm ci

      - name: Capture final dependency audit
        shell: bash
        run: |
          set +e
          npm audit --json > audit.json
          audit_exit=$?
          node -e "const a=require('./audit.json'); console.log(JSON.stringify(a.metadata?.vulnerabilities || {}))"
          echo "${audit_exit}" > audit-exit-code.txt
          exit 0

      - name: Capture validation results
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          check_exit=$?
          npm run build > build.log 2>&1
          build_exit=$?
          printf '{"check":%s,"build":%s}\n' "${check_exit}" "${build_exit}" > validation-status.json
          exit 0

      - name: Upload repaired lockfile, audit, and validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-hardening-output
          path: |
            package-lock.json
            audit.json
            audit-exit-code.txt
            validation-status.json
            check.log
            build.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce zero-vulnerability and validation gates
        shell: bash
        run: |
          audit_exit="$(cat audit-exit-code.txt)"
          check_exit="$(node -p "require('./validation-status.json').check")"
          build_exit="$(node -p "require('./validation-status.json').build")"
          if [ "${audit_exit}" != "0" ] || [ "${check_exit}" != "0" ] || [ "${build_exit}" != "0" ]; then
            echo "Dependency hardening failed: audit=${audit_exit}, check=${check_exit}, build=${build_exit}"
            exit 1
          fi
