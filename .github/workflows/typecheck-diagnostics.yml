name: Mutation diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install dependencies
        run: npm ci --silent

      - name: Capture targeted mutation tests
        shell: bash
        run: |
          set +e
          npx vitest run lib/supabase/client.test.ts > mutation-test-output.txt 2>&1
          echo "$?" > mutation-test-exit-code.txt
          exit 0

      - name: Upload mutation test output
        uses: actions/upload-artifact@v4
        with:
          name: mutation-test-output
          path: |
            mutation-test-output.txt
            mutation-test-exit-code.txt
          if-no-files-found: error
          retention-days: 1
