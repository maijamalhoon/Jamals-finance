name: Documents source verification

on:
  push:
    branches: [main]
    paths:
      - documents-build-trigger.txt

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: build-verification-placeholder
      NEXT_PUBLIC_SITE_URL: https://jamals-finance-sable.vercel.app
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Fix browser document shadowing
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('components/business/BusinessDocumentsWorkspace.tsx')
          source = path.read_text()
          old = '    document.getElementById("document-upload-panel")?.scrollIntoView({ behavior: "smooth", block: "start" });'
          new = '    globalThis.document.getElementById("document-upload-panel")?.scrollIntoView({ behavior: "smooth", block: "start" });'
          if old not in source:
              raise SystemExit('Document shadowing marker not found')
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Commit verified fix and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/documents-fix-build-once.yml documents-build-trigger.txt
          printf 'status=success\nverified_source=%s\n' "$(git rev-parse HEAD)" > documents-build-result.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/business/BusinessDocumentsWorkspace.tsx documents-build-result.txt .github/workflows/documents-fix-build-once.yml documents-build-trigger.txt
          git commit -m "fix(documents): verify private records workspace"
          git push origin HEAD:main
