name: Package production source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  package:
    if: github.head_ref == 'ops/production-deploy-package'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out production main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false
          show-progress: false

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.vercel' \
            -czf jamals-finance-production-source.tar.gz .

      - name: Upload source archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jamals-finance-production-source
          path: jamals-finance-production-source.tar.gz
          if-no-files-found: error
          retention-days: 1
