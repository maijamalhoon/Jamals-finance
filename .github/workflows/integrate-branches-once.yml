name: Integrate branches once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/integrate-branches-once.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: integrate-branches-once
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Patch branch navigation and permissions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text()
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match in {path}, found {count}: {old[:80]!r}")
              path.write_text(text.replace(old, new, 1))

          dashboard = Path("app/business/[businessSlug]/page.tsx")
          replace_once(
              dashboard,
              '  Landmark,\n  ReceiptText,',
              '  Landmark,\n  MapPinned,\n  ReceiptText,',
          )
          replace_once(
              dashboard,
              '''  {
              key: "documents",
              label: "Documents & records",
              description: "Private company files, folders, immutable versions, secure downloads, linked records, and audit history.",
              icon: FileArchive,
              route: "documents",
            },
            {
              key: "contacts",'''.replace("            ", ""),
              '''  {
              key: "documents",
              label: "Documents & records",
              description: "Private company files, folders, immutable versions, secure downloads, linked records, and audit history.",
              icon: FileArchive,
              route: "documents",
            },
            {
              key: "branches",
              label: "Branches & locations",
              description: "Operational locations, primary branch control, managers, member scope, and immutable access history.",
              icon: MapPinned,
              route: "branches",
            },
            {
              key: "contacts",'''.replace("            ", ""),
          )
          replace_once(
              dashboard,
              '''  const canViewDocuments =
            ["owner", "admin", "accountant", "manager", "sales", "inventory", "viewer"].includes(role) ||
            permissions.includes("*") ||
            permissions.includes("documents.view") ||
            permissions.includes("documents.manage");'''.replace("            ", "    "),
              '''  const canViewDocuments =
            ["owner", "admin", "accountant", "manager", "sales", "inventory", "viewer"].includes(role) ||
            permissions.includes("*") ||
            permissions.includes("documents.view") ||
            permissions.includes("documents.manage");
          const canViewBranches =
            ["owner", "admin", "accountant", "manager", "sales", "cashier", "inventory", "viewer"].includes(role) ||
            permissions.includes("*") ||
            permissions.includes("branches.view") ||
            permissions.includes("branches.manage");'''.replace("            ", "    "),
          )
          replace_once(
              dashboard,
              "accounting, banking, budgeting, documents, tax, permission, notification, and reporting source of truth.",
              "accounting, banking, budgeting, documents, branches, tax, permission, notification, and reporting source of truth.",
          )
          replace_once(
              dashboard,
              '["banking", "budgeting", "documents", "team", "notifications", "tax-closing"]',
              '["banking", "budgeting", "documents", "branches", "team", "notifications", "tax-closing"]',
          )
          replace_once(
              dashboard,
              ''': module.key === "documents"
                                      ? canViewDocuments
                                      : true;''',
              ''': module.key === "documents"
                                      ? canViewDocuments
                                      : module.key === "branches"
                                        ? canViewBranches
                                        : true;''',
          )
          replace_once(
              dashboard,
              "Accounting, banking, budgeting, documents, tax, access control, and alerts are active",
              "Accounting, banking, budgeting, documents, branches, tax, access control, and alerts are active",
          )
          replace_once(
              dashboard,
              "approved budgets, private versioned records, rolling forecasts, fiscal periods",
              "approved budgets, private versioned records, protected branch scopes, rolling forecasts, fiscal periods",
          )

          panel = Path("components/business/BusinessFinancialPermissionPanel.tsx")
          replace_once(
              panel,
              'import { BadgeCheck, FileArchive, Landmark, Save, ShieldCheck, TrendingUp } from "lucide-react";',
              'import { BadgeCheck, FileArchive, Landmark, MapPinned, Save, ShieldCheck, TrendingUp } from "lucide-react";',
          )
          replace_once(
              panel,
              '''  { value: "documents.view", label: "View records", icon: FileArchive },
            { value: "documents.manage", label: "Manage records", icon: FileArchive },
          ] as const;'''.replace("            ", "  "),
              '''  { value: "documents.view", label: "View records", icon: FileArchive },
            { value: "documents.manage", label: "Manage records", icon: FileArchive },
            { value: "branches.view", label: "View branches", icon: MapPinned },
            { value: "branches.manage", label: "Manage branch scope", icon: MapPinned },
          ] as const;'''.replace("            ", "  "),
          )
          replace_once(
              panel,
              "Banking, planning, and company-record permissions are tenant-scoped.",
              "Banking, planning, company-record, and branch permissions are tenant-scoped.",
          )
          replace_once(
              panel,
              "Add another team member to configure Banking, Budgeting, or Documents access.",
              "Add another team member to configure Banking, Budgeting, Documents, or Branches access.",
          )

          workspace = Path("components/business/BusinessBranchesWorkspace.tsx")
          replace_once(
              workspace,
              'import { useMemo, useState } from "react";',
              'import type { ReactNode } from "react";\nimport { useMemo, useState } from "react";',
          )
          replace_once(workspace, "children: React.ReactNode", "children: ReactNode")
          PY

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Commit verified integration and remove workflow
        shell: bash
        run: |
          rm .github/workflows/integrate-branches-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/business/'[businessSlug]'/page.tsx components/business/BusinessFinancialPermissionPanel.tsx components/business/BusinessBranchesWorkspace.tsx .github/workflows/integrate-branches-once.yml
          git commit -m "feat(branches): connect verified locations workspace"
          git pull --rebase origin main
          git push origin HEAD:main
