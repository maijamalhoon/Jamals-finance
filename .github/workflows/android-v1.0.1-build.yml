name: Android v1.0.1 Build

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/android-v1.0.1-build.yml"

permissions:
  contents: write

jobs:
  build-android-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report build start
        run: |
          cat > android-twa/release-handoff-v1.0.1.json <<JSON
          {
            "status": "started",
            "runId": "${GITHUB_RUN_ID}",
            "artifactName": "jamals-finance-android-v1.0.1-unsigned",
            "sourceCommit": "${GITHUB_SHA}"
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-twa/release-handoff-v1.0.1.json
          git commit -m "chore(android): record v1.0.1 build start" || true
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify unsigned Android package
        id: package
        shell: bash
        run: |
          set -u
          mkdir -p diagnostics handoff
          exec > >(tee diagnostics/build.log) 2>&1

          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

          curl --fail --location --silent --show-error \
            "https://pwabuilder-cloudapk.azurewebsites.net/downloadPackageZip?id=googleplaypackagejob%3Ajamals-finance-sable.vercel.app%3A008936" \
            --output source-package.zip
          unzip -q source-package.zip -d package

          source_dir="$(find package -type f -path '*/app/build.gradle' -printf '%h\n' | sed 's#/app$##' | head -n 1)"
          test -n "$source_dir"
          build_file="$source_dir/app/build.gradle"

          sed -i 's/targetSdkVersion 35/targetSdkVersion 36/' "$build_file"
          sed -i 's/versionCode 1/versionCode 2/' "$build_file"
          sed -i 's/versionName "1.0.0.0"/versionName "1.0.1"/' "$build_file"

          grep -q 'compileSdkVersion 36' "$build_file"
          grep -q 'targetSdkVersion 36' "$build_file"
          grep -q 'versionCode 2' "$build_file"
          grep -q 'versionName "1.0.1"' "$build_file"

          cd "$source_dir"
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-daemon --stacktrace
          cd "$GITHUB_WORKSPACE"

          apk="$(find "$source_dir/app/build/outputs/apk/release" -type f -name '*release*.apk' | head -n 1)"
          aab="$(find "$source_dir/app/build/outputs/bundle/release" -type f -name '*release*.aab' | head -n 1)"
          test -s "$apk"
          test -s "$aab"

          "$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$apk" > diagnostics/apk-badging.txt
          grep -q "package: name='com.jamalsfinance.app' versionCode='2' versionName='1.0.1'" diagnostics/apk-badging.txt
          grep -q "sdkVersion:'23'" diagnostics/apk-badging.txt
          grep -q "targetSdkVersion:'36'" diagnostics/apk-badging.txt

          cp "$apk" handoff/jamals-finance-v1.0.1-unsigned.apk
          cp "$aab" handoff/jamals-finance-v1.0.1-unsigned.aab
          cp diagnostics/apk-badging.txt handoff/
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned Android update
        if: steps.package.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-android-v1.0.1-unsigned
          path: handoff/
          if-no-files-found: error
          retention-days: 1

      - name: Upload build diagnostics
        if: steps.package.outputs.success != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-android-v1.0.1-diagnostics
          path: diagnostics/
          retention-days: 1

      - name: Report final build status
        if: always()
        env:
          BUILD_OK: ${{ steps.package.outputs.success }}
        run: |
          if [ "$BUILD_OK" = "true" ]; then status="completed"; else status="failed"; fi
          cat > android-twa/release-handoff-v1.0.1.json <<JSON
          {
            "status": "${status}",
            "runId": "${GITHUB_RUN_ID}",
            "artifactName": "jamals-finance-android-v1.0.1-unsigned",
            "sourceCommit": "${GITHUB_SHA}"
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-twa/release-handoff-v1.0.1.json
          git commit -m "chore(android): record v1.0.1 build status" || true
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Fail workflow when build failed
        if: steps.package.outputs.success != 'true'
        run: exit 1
