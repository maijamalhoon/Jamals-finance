name: Sync category manager v2 with main

on:
  push:
    branches:
      - feat/category-manager-v2
    paths:
      - ".github/workflows/sync-category-v2-main.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out category branch
        uses: actions/checkout@v4
        with:
          ref: feat/category-manager-v2
          fetch-depth: 0

      - name: Merge latest main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          rm -f .github/workflows/sync-category-v2-main.yml
          git add -A
          git commit -m "chore: remove temporary branch sync workflow"
          git push origin HEAD:feat/category-manager-v2
