name: I18n diagnostics

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/device-language-foundation

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: false
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Capture lint diagnostics
        shell: bash
        run: |
          set +e
          npm run lint -- --format json --output-file lint-report.json
          echo "$?" > lint-exit-code.txt
          npm run typecheck > typecheck-report.txt 2>&1
          echo "$?" > typecheck-exit-code.txt
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: i18n-diagnostics
          path: |
            lint-report.json
            lint-exit-code.txt
            typecheck-report.txt
            typecheck-exit-code.txt
          if-no-files-found: error
          retention-days: 1
