name: Category picker diagnostics

on:
  push:
    branches: [feature/category-visual-picker]
    paths:
      - "components/settings/CategoryManagementExperience.tsx"
      - ".github/workflows/category-picker-diagnostics.yml"
  pull_request:
    branches: [main]
    paths:
      - "components/settings/CategoryManagementExperience.tsx"
      - ".github/workflows/category-picker-diagnostics.yml"

permissions:
  contents: read

jobs:
  validation-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
      - run: npm ci --silent
      - name: Capture complete validation report
        shell: bash
        run: |
          set +e
          npx eslint components/settings/CategoryManagementExperience.tsx --format json > category-lint.json 2>&1
          echo "$?" > category-lint-exit-code.txt
          npm run typecheck > typecheck.txt 2>&1
          echo "$?" > typecheck-exit-code.txt
          npx vitest run lib/security-hardening.test.ts > security-tests.txt 2>&1
          echo "$?" > security-tests-exit-code.txt
          npm test > tests.txt 2>&1
          echo "$?" > tests-exit-code.txt
          npm run build > build.txt 2>&1
          echo "$?" > build-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: category-picker-validation-report
          path: |
            category-lint.json
            category-lint-exit-code.txt
            typecheck.txt
            typecheck-exit-code.txt
            security-tests.txt
            security-tests-exit-code.txt
            tests.txt
            tests-exit-code.txt
            build.txt
            build-exit-code.txt
          if-no-files-found: error
          retention-days: 1
