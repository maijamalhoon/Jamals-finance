name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install dependencies
        run: npm ci --silent

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Lint (diagnostic until existing UI hook violations are resolved)
        id: lint
        continue-on-error: true
        run: npm run lint -- --format stylish > lint-report.txt 2>&1

      - name: Upload lint diagnostics
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-report
          path: lint-report.txt
          if-no-files-found: error
          retention-days: 2

      - name: Typecheck
        run: npm run typecheck

      - name: Run blocking security contract tests
        run: npx vitest run lib/security-hardening.test.ts

      - name: Run legacy application suite (diagnostic)
        id: test
        continue-on-error: true
        run: npm test > test-report.txt 2>&1

      - name: Upload legacy test diagnostics
        if: steps.test.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-report
          path: test-report.txt
          if-no-files-found: error
          retention-days: 2

      - name: Build production application
        run: npm run build
