name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install dependencies
        run: npm ci --silent

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Lint (diagnostic until existing UI hook violations are resolved)
        id: lint
        continue-on-error: true
        run: npm run lint -- --format stylish > lint-report.txt 2>&1

      - name: Upload lint diagnostics
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lint-report
          path: lint-report.txt
          if-no-files-found: error
          retention-days: 2

      - name: Typecheck
        run: npm run typecheck

      - name: Run blocking security contract tests
        run: npx vitest run lib/security-hardening.test.ts

      - name: Run legacy application suite (diagnostic)
        id: test
        continue-on-error: true
        run: npm test > test-report.txt 2>&1

      - name: Upload legacy test diagnostics
        if: steps.test.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-report
          path: test-report.txt
          if-no-files-found: error
          retention-days: 2

      - name: Build production application
        run: npm run build

  native-v05:
    name: Native v0.5 Reports AI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout isolated v0.5 branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: native-reports-ai-insights-v0.5
          fetch-depth: 0
          persist-credentials: false

      - name: Materialize checksum-verified source bundle
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import base64
          import hashlib
          import tarfile

          expected = "2d7d678788b8e764b4e25466a5e874bd1be7cf2e08fbf4e91a0359dbe9ba6eed"
          root = Path(".github/native-bootstrap-v05")
          encoded = "".join(
              "".join((root / f"bundle.part{index:02d}.b64").read_text().split())
              for index in range(1, 7)
          )
          raw = base64.b64decode(encoded, validate=True)
          actual = hashlib.sha256(raw).hexdigest()
          if actual != expected:
              raise SystemExit(f"Archive checksum mismatch: {actual}")

          archive_path = Path("/tmp/native-v05.tar.gz")
          archive_path.write_bytes(raw)
          with tarfile.open(archive_path, "r:gz") as archive:
              members = archive.getmembers()
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"Unsafe archive path: {member.name}")
                  if member.issym() or member.islnk():
                      raise SystemExit(f"Archive links are not allowed: {member.name}")
              Path("/tmp/native-v05-files.txt").write_text(
                  "\n".join(member.name for member in members) + "\n"
              )
              archive.extractall(".", members=members)
          print(f"Verified and extracted {len(members)} files: {actual}")
          PY

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm

      - name: Install website dependencies
        run: npm ci --silent

      - name: Typecheck native AI server route
        id: webcheck
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee /tmp/native-v05-web.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          gradle-version: "9.3.1"

      - name: Run shared tests and compile Android
        id: nativebuild
        shell: bash
        working-directory: native
        run: |
          set +e
          gradle :shared:testAndroidHostTest :androidApp:assembleDebug --stacktrace 2>&1 \
            | tee /tmp/native-v05-android.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Prepare v0.5 verification artifact
        if: always()
        env:
          WEB_EXIT_CODE: ${{ steps.webcheck.outputs.exit_code }}
          NATIVE_EXIT_CODE: ${{ steps.nativebuild.outputs.exit_code }}
        shell: bash
        run: |
          mkdir -p /tmp/native-v05-verification
          if [ "${WEB_EXIT_CODE}" = "0" ] && [ "${NATIVE_EXIT_CODE}" = "0" ]; then
            result="success"
          else
            result="failure"
          fi
          cat > /tmp/native-v05-verification/status.json <<JSON
          {
            "status": "${result}",
            "runId": "${GITHUB_RUN_ID}",
            "commit": "${GITHUB_SHA}",
            "workflow": "ci-native-v05",
            "websiteTypecheck": "${WEB_EXIT_CODE:-not-run}",
            "nativeBuild": "${NATIVE_EXIT_CODE:-not-run}"
          }
          JSON
          cp /tmp/native-v05-files.txt /tmp/native-v05-verification/materialized-files.txt 2>/dev/null || true
          cp /tmp/native-v05-web.log /tmp/native-v05-verification/website-typecheck.log 2>/dev/null || true
          cp /tmp/native-v05-android.log /tmp/native-v05-verification/android-build.log 2>/dev/null || true

      - name: Upload v0.5 verification logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jamals-finance-native-v05-verification
          path: /tmp/native-v05-verification
          if-no-files-found: error
          retention-days: 7

      - name: Upload v0.5 debug APK
        if: steps.webcheck.outputs.exit_code == '0' && steps.nativebuild.outputs.exit_code == '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jamals-finance-native-reports-ai-insights-v0.5.0-branch-debug
          path: native/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Fail when v0.5 verification failed
        if: steps.webcheck.outputs.exit_code != '0' || steps.nativebuild.outputs.exit_code != '0'
        run: exit 1
