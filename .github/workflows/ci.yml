name: CI

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validation source snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Package merged validation source
        run: tar --exclude=.git --exclude=node_modules --exclude=.next --exclude=validation-source.tar.gz -czf validation-source.tar.gz .

      - name: Upload merged validation source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: validation-source
          path: validation-source.tar.gz
          if-no-files-found: error
          retention-days: 1
