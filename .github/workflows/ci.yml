# Validates every main release candidate before deployment.
name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install dependencies
        run: npm ci --silent

      - name: Enforce zero known dependency vulnerabilities
        run: npm audit --audit-level=low

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run security contract tests
        run: npx vitest run lib/security-hardening.test.ts

      - name: Run complete application suite
        run: npm test

      - name: Upload icon parser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jalvoro-icon-parser-diagnostics
          path: build/jalvoro-icon-parser-diff.json
          if-no-files-found: ignore
          retention-days: 3

      - name: Build production application
        run: npm run build
