name: Apply JALVORO test fixes

on:
  push:
    branches:
      - agent/fix-jalvoro-ci

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/fix-jalvoro-ci
          fetch-depth: 1

      - name: Update stale test contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          auth_path = Path("lib/auth-experience.test.ts")
          auth = auth_path.read_text()
          old_auth = '    expect(authShellSource).toContain("Jamal&apos;s Finance");'
          new_auth = '''    expect(authShellSource).toContain('import { APP_NAME, brand } from "@/lib/brand"');
              expect(authShellSource).toContain("<span>{APP_NAME}</span>");
              expect(authShellSource).toContain("src={brand.assets.logoMark}");
              expect(authShellSource).not.toContain("Jamal&apos;s Finance");'''
          if old_auth not in auth:
              raise SystemExit("AuthShell legacy assertion was not found")
          auth_path.write_text(auth.replace(old_auth, new_auth, 1))

          icon_path = Path("components/icons/jalvoro/lucide-runtime-contract.test.ts")
          icon = icon_path.read_text()
          old_icon = '    expect(packageJson.scripts.prebuild).toBe("npm run generate:icons");'
          new_icon = '    expect(packageJson.scripts.prebuild).toBe("npm run generate:icons && npm run brand:sync");'
          if old_icon not in icon:
              raise SystemExit("Icon prebuild assertion was not found")
          icon_path.write_text(icon.replace(old_icon, new_icon, 1))

          Path(".github/workflows/apply-jalvoro-test-fix.yml").unlink()
          PY

      - name: Commit exact fixes
        shell: bash
        run: |
          git config user.name "JALVORO CI"
          git config user.email "actions@users.noreply.github.com"
          git add lib/auth-experience.test.ts components/icons/jalvoro/lucide-runtime-contract.test.ts .github/workflows/apply-jalvoro-test-fix.yml
          git commit -m "test: align contracts with central JALVORO branding"
          git push origin HEAD:agent/fix-jalvoro-ci
