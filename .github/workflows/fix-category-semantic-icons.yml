name: Fix category semantic icon contract

on:
  push:
    branches:
      - feat/category-manager-v2-direct
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/category-manager-v2-direct
          fetch-depth: 0
      - name: Restore distinct bill, rent and investment icons
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          visuals = Path('lib/category-visuals.tsx')
          source = visuals.read_text()
          replacements = [
              ('  Droplets,\n  Dumbbell,', '  Droplets,\n  Dumbbell,\n  FileText,'),
              ('  Home,\n  Landmark,', '  Home,\n  KeyRound,\n  Landmark,'),
              ('  investment: ChartCandlestick,\n  help:', '  investment: ChartCandlestick,\n  investments: ChartCandlestick,\n  bills: FileText,\n  rent: KeyRound,\n  help:'),
          ]
          for old, new in replacements:
              if old not in source:
                  raise SystemExit(f'missing visual replacement: {old!r}')
              source = source.replace(old, new, 1)

          rule_anchor = 'const CATEGORY_ICON_RULES: readonly CategoryIconRule[] = [\n'
          distinct_rules = '\n'.join([
              'const CATEGORY_ICON_RULES: readonly CategoryIconRule[] = [',
              '  {',
              '    iconKey: "investments",',
              '    aliases: ["investment", "investments", "stock", "stocks", "shares", "portfolio", "mutual fund"],',
              '  },',
              '  {',
              '    iconKey: "bills",',
              '    aliases: ["bill", "bills", "invoice", "monthly bill"],',
              '  },',
              '  {',
              '    iconKey: "rent",',
              '    type: "expense",',
              '    aliases: ["rent", "kiraya", "lease payment"],',
              '  },',
          ]) + '\n'
          if rule_anchor not in source:
              raise SystemExit('missing category rule anchor')
          source = source.replace(rule_anchor, distinct_rules, 1)
          visuals.write_text(source)

          catalog = Path('lib/category-icon-catalog.ts')
          source = catalog.read_text()
          catalog_replacements = [
              ('{ iconKey: "investment", label: "Investment return", types: INCOME,', '{ iconKey: "investments", label: "Investment return", types: INCOME,'),
              ('{ iconKey: "home", label: "Home and rent", types: EXPENSE,', '{ iconKey: "rent", label: "Rent and lease", types: EXPENSE,'),
              ('{ iconKey: "receipt", label: "Bills and receipts", types: EXPENSE,', '{ iconKey: "bills", label: "Bills and invoices", types: EXPENSE,'),
          ]
          for old, new in catalog_replacements:
              if old not in source:
                  raise SystemExit(f'missing catalog replacement: {old!r}')
              source = source.replace(old, new, 1)
          catalog.write_text(source)
          PY
          rm -f .github/workflows/fix-category-semantic-icons.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(categories): restore distinct semantic icon keys"
          git push origin HEAD:feat/category-manager-v2-direct
