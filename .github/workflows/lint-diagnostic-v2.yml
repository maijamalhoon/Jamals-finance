name: Lint diagnostics v2

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  lint-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - name: Capture ESLint JSON
        shell: bash
        run: |
          set +e
          npm run lint -- --format json --output-file eslint-v2.json
          status=$?
          test -f eslint-v2.json || echo '[]' > eslint-v2.json
          exit "$status"
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eslint-v2
          path: eslint-v2.json
          retention-days: 1
