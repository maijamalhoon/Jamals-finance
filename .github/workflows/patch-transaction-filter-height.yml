name: Patch transaction filter height

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-transaction-filter-height.yml"

permissions:
  contents: write

concurrency:
  group: patch-transaction-filter-height-main
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Reduce only the mobile filter menu height
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("components/transactions/TransactionFilters.tsx")
          text = path.read_text(encoding="utf-8")
          old = "const MOBILE_FILTER_HEIGHT_RATIO = 0.52;"
          new = "const MOBILE_FILTER_HEIGHT_RATIO = 0.46;"

          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise SystemExit("Expected transaction filter height constant was not found")
          PY
      - name: Commit the targeted change and remove this temporary workflow
        run: |
          git rm .github/workflows/patch-transaction-filter-height.yml
          git add components/transactions/TransactionFilters.tsx
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Reduce transaction filter dropdown height"
          git push origin HEAD:main
