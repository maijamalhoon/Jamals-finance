name: Android Package Build

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/android-package-build.yml"
      - "android-twa/**"

permissions:
  contents: read

jobs:
  build-unsigned-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Create package request
        run: |
          cat > package-options.json <<'JSON'
          {
            "appVersion": "1.0.0.0",
            "appVersionCode": 1,
            "backgroundColor": "#F3F6FA",
            "display": "standalone",
            "enableNotifications": false,
            "enableSiteSettingsShortcut": true,
            "fallbackType": "customtabs",
            "features": {
              "locationDelegation": { "enabled": false },
              "playBilling": { "enabled": false }
            },
            "host": "jamals-finance-sable.vercel.app",
            "pwaUrl": "https://jamals-finance-sable.vercel.app",
            "fullScopeUrl": "https://jamals-finance-sable.vercel.app/",
            "iconUrl": "https://jamals-finance-sable.vercel.app/icons/icon-512.png",
            "includeSourceCode": false,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "launcherName": "Jamal's Finance",
            "maskableIconUrl": "https://jamals-finance-sable.vercel.app/icons/icon-maskable-512.png",
            "monochromeIconUrl": "",
            "name": "Jamal's Finance",
            "navigationColor": "#F3F6FA",
            "navigationColorDark": "#0B1220",
            "navigationDividerColor": "#F3F6FA",
            "navigationDividerColorDark": "#0B1220",
            "orientation": "portrait-primary",
            "packageId": "com.jamalsfinance.app",
            "shortcuts": [],
            "signing": {
              "file": null,
              "alias": "",
              "fullName": "",
              "organization": "",
              "organizationalUnit": "",
              "countryCode": "",
              "keyPassword": "",
              "storePassword": ""
            },
            "signingMode": "none",
            "splashScreenFadeOutDuration": 300,
            "startUrl": "/?source=twa",
            "themeColor": "#2956C8",
            "themeColorDark": "#2956C8",
            "webManifestUrl": "https://jamals-finance-sable.vercel.app/manifest.webmanifest",
            "minSdkVersion": 23
          }
          JSON

      - name: Enqueue unsigned Android package
        id: enqueue
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          status="$(curl --silent --show-error --output "$response_file" --write-out '%{http_code}' \
            --request POST \
            --header 'content-type: application/json' \
            --header 'platform-identifier: jamals-finance' \
            --header 'platform-identifier-version: 1.0.0' \
            --data-binary @package-options.json \
            https://pwabuilder-cloudapk.azurewebsites.net/enqueuePackageJob)"
          body="$(cat "$response_file")"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "$body"
            exit 1
          fi
          job_id="$(printf '%s' "$body" | tr -d '\r\n\"')"
          test -n "$job_id"
          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"
          echo "Android package job created."

      - name: Wait for package generation
        env:
          JOB_ID: ${{ steps.enqueue.outputs.job_id }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            curl --silent --show-error \
              "https://pwabuilder-cloudapk.azurewebsites.net/getPackageJob?id=${JOB_ID}" \
              -o job.json
            status="$(jq -r '.status // empty' job.json)"
            echo "Package status: ${status:-unknown}"
            if [ "$status" = "Completed" ]; then
              exit 0
            fi
            if [ "$status" = "Failed" ]; then
              cat job.json
              exit 1
            fi
            sleep 10
          done
          echo "Package generation did not complete within the workflow timeout."
          cat job.json || true
          exit 1

      - name: Download unsigned APK and AAB package
        env:
          JOB_ID: ${{ steps.enqueue.outputs.job_id }}
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            "https://pwabuilder-cloudapk.azurewebsites.net/downloadPackageZip?id=${JOB_ID}" \
            --output jamals-finance-android-unsigned.zip
          unzip -t jamals-finance-android-unsigned.zip

      - name: Upload unsigned Android package
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-android-unsigned
          path: jamals-finance-android-unsigned.zip
          if-no-files-found: error
          retention-days: 3
