name: One-time finance form redesign

on:
  push:
    paths:
      - ".github/workflows/form-redesign-once.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-finance-form-redesign
  cancel-in-progress: false

