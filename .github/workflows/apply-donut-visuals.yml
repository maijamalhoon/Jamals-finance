name: Apply focused donut visual patch

on:
  push:
    branches: [main]
    paths:
      - ".github/scripts/patch-donut-visuals.mjs"
      - ".github/workflows/apply-donut-visuals.yml"

permissions:
  contents: write

concurrency:
  group: apply-donut-visuals-main
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply exact visual-only changes
        run: node .github/scripts/patch-donut-visuals.mjs

      - name: Validate changed components
        run: |
          git diff --check
          npm ci --no-audit --no-fund
          npx eslint \
            components/dashboard/SpendingBreakdown.tsx \
            components/dashboard/InvestmentOverviewWidget.tsx \
            components/analytics/AnalyticsCharts.tsx \
            components/investments/InvestmentOverviewClean.tsx

      - name: Commit donut visual update and remove patch helpers
        run: |
          rm .github/scripts/patch-donut-visuals.mjs
          rm .github/workflows/apply-donut-visuals.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            components/dashboard/SpendingBreakdown.tsx \
            components/dashboard/InvestmentOverviewWidget.tsx \
            components/analytics/AnalyticsCharts.tsx \
            components/investments/InvestmentOverviewClean.tsx
          git add -u \
            .github/scripts/patch-donut-visuals.mjs \
            .github/workflows/apply-donut-visuals.yml

          git commit -m "Polish donut curves and center labels"
          git push origin HEAD:main
