name: Native v0.4 Verification

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/native-v04-verify.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout isolated native branch
        uses: actions/checkout@v4
        with:
          ref: native-investments-analytics-v0.4
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Run shared tests and compile Android
        id: build
        shell: bash
        working-directory: native
        run: |
          set +e
          gradle :shared:testAndroidHostTest :androidApp:assembleDebug --stacktrace 2>&1 | tee /tmp/native-v04-build.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload native v0.4 debug APK
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-native-investments-analytics-v0.4.0-debug
          path: native/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Record verification result on branch
        if: always()
        env:
          BUILD_EXIT_CODE: ${{ steps.build.outputs.exit_code }}
        run: |
          if [ "${BUILD_EXIT_CODE}" = "0" ]; then result="success"; else result="failure"; fi
          mkdir -p .github
          cat > .github/native-v04-status.json <<JSON
          {
            "status": "${result}",
            "runId": "${GITHUB_RUN_ID}",
            "commit": "${GITHUB_SHA}",
            "workflow": "native-v04-verify"
          }
          JSON
          {
            echo "=== ACTIONABLE LINES ==="
            grep -n -E "(^e: |FAILURE:|What went wrong:|Unresolved reference|Cannot|error:)" /tmp/native-v04-build.log | head -n 180 || true
            echo
            echo "=== FINAL 120 LINES ==="
            tail -n 120 /tmp/native-v04-build.log || true
          } > .github/native-v04-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/native-v04-status.json .github/native-v04-log.txt
          git commit -m "chore(native): record v0.4 verification ${result}" || exit 0
          git pull --rebase origin native-investments-analytics-v0.4
          git push origin HEAD:native-investments-analytics-v0.4

      - name: Fail when native build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
