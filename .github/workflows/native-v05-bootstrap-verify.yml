name: Native v0.5 Reports AI Bootstrap Verify

on:
  push:
    branches: [native-reports-ai-insights-v0.5]
    paths:
      - ".github/native-bootstrap-v05/**"
      - ".github/workflows/native-v05-bootstrap-verify.yml"
      - "app/api/native/ai-insights/route.ts"
      - "native/androidApp/build.gradle.kts"
      - "native/androidApp/src/main/kotlin/com/jamalsfinance/nativeapp/MainActivity.kt"
      - "native/androidApp/src/main/kotlin/com/jamalsfinance/nativeapp/ui/JamalsFinanceNativeApp.kt"
      - "native/androidApp/src/main/kotlin/com/jamalsfinance/nativeapp/ui/NativeModuleRoot.kt"
      - "native/androidApp/src/main/kotlin/com/jamalsfinance/nativeapp/ui/ReportsInsightsDashboard.kt"
      - "native/shared/src/commonMain/kotlin/com/jamalsfinance/shared/reports/ReportsInsightsRepository.kt"
      - "native/shared/src/commonTest/kotlin/com/jamalsfinance/shared/reports/ReportsInsightsModelsTest.kt"
      - "native/README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-or-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout v0.5 branch
        uses: actions/checkout@v4
        with:
          ref: native-reports-ai-insights-v0.5
          fetch-depth: 0

      - name: Materialize checksum-verified source bundle
        id: materialize
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .github/native-bootstrap-v05 ]; then
            echo "materialized=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat .github/native-bootstrap-v05/bundle.part01.b64 \
              .github/native-bootstrap-v05/bundle.part02.b64 \
              .github/native-bootstrap-v05/bundle.part03.b64 \
              .github/native-bootstrap-v05/bundle.part04.b64 \
              .github/native-bootstrap-v05/bundle.part05.b64 \
              .github/native-bootstrap-v05/bundle.part06.b64 \
              | base64 --decode > /tmp/native-v05.tar.gz

          echo "2d7d678788b8e764b4e25466a5e874bd1be7cf2e08fbf4e91a0359dbe9ba6eed  /tmp/native-v05.tar.gz" \
              | sha256sum --check --strict
          tar -tzf /tmp/native-v05.tar.gz >/tmp/native-v05-files.txt
          tar -xzf /tmp/native-v05.tar.gz -C .
          rm -rf .github/native-bootstrap-v05

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(native): add reports and AI insights milestone"
          git pull --rebase origin native-reports-ai-insights-v0.5
          git push origin HEAD:native-reports-ai-insights-v0.5
          echo "materialized=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node 24
        if: steps.materialize.outputs.materialized != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install website dependencies
        if: steps.materialize.outputs.materialized != 'true'
        run: npm ci

      - name: Typecheck native AI server route
        if: steps.materialize.outputs.materialized != 'true'
        id: webcheck
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee /tmp/native-v05-web.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Set up Java 17
        if: steps.materialize.outputs.materialized != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android
        if: steps.materialize.outputs.materialized != 'true'
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        if: steps.materialize.outputs.materialized != 'true'
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Set up Gradle
        if: steps.materialize.outputs.materialized != 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Run shared tests and compile Android
        if: steps.materialize.outputs.materialized != 'true'
        id: nativebuild
        shell: bash
        working-directory: native
        run: |
          set +e
          gradle :shared:testAndroidHostTest :androidApp:assembleDebug --stacktrace 2>&1 \
            | tee /tmp/native-v05-android.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload v0.5 debug APK
        if: >-
          steps.materialize.outputs.materialized != 'true' &&
          steps.webcheck.outputs.exit_code == '0' &&
          steps.nativebuild.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-native-reports-ai-insights-v0.5.0-debug
          path: native/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Record v0.5 verification result
        if: steps.materialize.outputs.materialized != 'true' && always()
        env:
          WEB_EXIT_CODE: ${{ steps.webcheck.outputs.exit_code }}
          NATIVE_EXIT_CODE: ${{ steps.nativebuild.outputs.exit_code }}
        shell: bash
        run: |
          if [ "${WEB_EXIT_CODE}" = "0" ] && [ "${NATIVE_EXIT_CODE}" = "0" ]; then
            result="success"
          else
            result="failure"
          fi
          cat > .github/native-v05-status.json <<JSON
          {
            "status": "${result}",
            "runId": "${GITHUB_RUN_ID}",
            "commit": "$(git rev-parse HEAD)",
            "workflow": "native-v05-bootstrap-verify",
            "websiteTypecheck": "${WEB_EXIT_CODE:-not-run}",
            "nativeBuild": "${NATIVE_EXIT_CODE:-not-run}"
          }
          JSON
          {
            echo "=== WEBSITE ACTIONABLE LINES ==="
            grep -n -E "(error TS|Type error|Failed|Error:)" /tmp/native-v05-web.log | head -n 180 || true
            echo
            echo "=== WEBSITE FINAL 100 LINES ==="
            tail -n 100 /tmp/native-v05-web.log || true
            echo
            echo "=== NATIVE ACTIONABLE LINES ==="
            grep -n -E "(^e: |FAILURE:|What went wrong:|Unresolved reference|Cannot|error:)" \
              /tmp/native-v05-android.log | head -n 220 || true
            echo
            echo "=== NATIVE FINAL 140 LINES ==="
            tail -n 140 /tmp/native-v05-android.log || true
          } > .github/native-v05-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/native-v05-status.json .github/native-v05-log.txt
          git commit -m "chore(native): record v0.5 verification ${result}" || exit 0
          git pull --rebase origin native-reports-ai-insights-v0.5
          git push origin HEAD:native-reports-ai-insights-v0.5

      - name: Fail when verification failed
        if: >-
          steps.materialize.outputs.materialized != 'true' &&
          (steps.webcheck.outputs.exit_code != '0' ||
          steps.nativebuild.outputs.exit_code != '0')
        run: exit 1
