name: Production smoke monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: read

concurrency:
  group: production-smoke-monitor
  cancel-in-progress: true

jobs:
  smoke:
    name: Public and auth boundary checks
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      BASE_URL: https://jamals-finance-sable.vercel.app
    steps:
      - name: Check public routes
        shell: bash
        run: |
          set -euo pipefail

          check_200() {
            local path="$1"
            local status
            status=$(curl --silent --show-error --location --retry 2 --retry-delay 2 --retry-all-errors --max-time 25 --output /dev/null --write-out '%{http_code}' "${BASE_URL}${path}")
            if [[ "$status" != "200" ]]; then
              echo "Expected 200 for ${path}, received ${status}."
              exit 1
            fi
          }

          check_200 "/"
          check_200 "/login"
          check_200 "/privacy"
          check_200 "/terms"
          check_200 "/disclosures"
          check_200 "/support"
          check_200 "/api/app-version"
          check_200 "/manifest.webmanifest"
          check_200 "/robots.txt"

      - name: Check protected page redirect
        shell: bash
        run: |
          set -euo pipefail
          headers=$(mktemp)
          status=$(curl --silent --show-error --retry 2 --retry-delay 2 --retry-all-errors --max-time 25 --output /dev/null --dump-header "$headers" --write-out '%{http_code}' "${BASE_URL}/dashboard")

          if [[ ! "$status" =~ ^30[2378]$ ]]; then
            echo "Expected an authentication redirect for /dashboard, received ${status}."
            cat "$headers"
            exit 1
          fi

          if ! grep -qiE '^location: .*/login' "$headers"; then
            echo "Dashboard did not redirect to /login."
            cat "$headers"
            exit 1
          fi

      - name: Check protected API denial
        shell: bash
        run: |
          set -euo pipefail
          status=$(curl --silent --show-error --retry 2 --retry-delay 2 --retry-all-errors --max-time 25 --output /dev/null --write-out '%{http_code}' "${BASE_URL}/api/ai-insights")

          if [[ "$status" != "401" ]]; then
            echo "Expected unauthenticated /api/ai-insights to return 401, received ${status}."
            exit 1
          fi
