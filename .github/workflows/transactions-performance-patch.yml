name: Transactions performance patch

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

concurrency:
  group: transactions-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out staging branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: transactions-performance-staging
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Apply asserted rendering patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def sub_once(path: str, pattern: str, replacement: str, *, flags: int = 0) -> None:
              file_path = Path(path)
              source = file_path.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, replacement, source, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"Expected one match in {path}, found {count}: {pattern[:120]!r}")
              file_path.write_text(updated, encoding="utf-8")

          page = "app/dashboard/transactions/page.tsx"
          sub_once(
              page,
              r'''  const \[rawTransactions, categoriesResult, accountsResult\] = await Promise\.all\(\[\n.*?\n  const accountOptions = \(accountsResult\.data \?\? \[\]\)\.map\(\(row\) => \(\{\n.*?\n  \}\)\);\n\n(?=  const transactions =)''',
              '''  const rawTransactions = await loadTransactions(supabase, {
            type: requestedDatabaseType,
            from,
            to,
            category,
            account,
            minAmount,
            maxAmount,
            includeDeleted: true,
          });

''',
              flags=re.S,
          )
          sub_once(
              page,
              r'''            <TransactionFilters\n              categories=\{categoryOptions\}\n              accounts=\{accountOptions\}\n            />''',
              '''            <TransactionFilters />''',
          )

          row = "components/transactions/TransactionRow.tsx"
          sub_once(
              row,
              r'''import \{ useMemo, useState \} from "react";\nimport \{ usePathname, useRouter \} from "next/navigation";''',
              '''import dynamic from "next/dynamic";
          import { usePathname, useRouter } from "next/navigation";
          import { useState } from "react";''',
          )
          sub_once(
              row,
              r'''import TransactionModal, \{\n  ExistingTransaction,\n\} from "@/components/dashboard/TransactionModal";''',
              '''import type { ExistingTransaction } from "@/components/dashboard/TransactionModal";''',
          )
          sub_once(
              row,
              r'''\} from "@/lib/transaction-icons";\n\ntype TransactionType =''',
              '''} from "@/lib/transaction-icons";

          const TransactionModal = dynamic(
            () => import("@/components/dashboard/TransactionModal"),
            { ssr: false },
          );

          type TransactionType =''',
          )
          sub_once(row, r'''  const supabase = useMemo\(\(\) => createClient\(\), \[\]\);\n''', "")
          sub_once(
              row,
              r'''    const \{ error \} = await supabase\.rpc\("delete_goal_contribution", \{''',
              '''    const { error } = await createClient().rpc("delete_goal_contribution", {''',
          )
          sub_once(
              row,
              r'''    const \{ error \} = await supabase\.rpc\(\n      "delete_liability_payment_transaction",''',
              '''    const { error } = await createClient().rpc(
              "delete_liability_payment_transaction",''',
          )
          sub_once(
              row,
              r'''    const \{ error \} = await supabase\n      \.from\(tableName\)''',
              '''    const { error } = await createClient()
              .from(tableName)''',
          )
          sub_once(
              row,
              r'''      \{canEdit \? \(\n        <TransactionModal\n          open=\{editOpen\}''',
              '''      {canEdit && editOpen ? (
              <TransactionModal
                open''',
          )
          PY

      - name: Install dependencies
        run: npm ci --silent

      - name: Run complete quality gate
        run: npm run check

      - name: Build production application
        run: npm run build

      - name: Commit verified patch and remove workflow
        shell: bash
        run: |
          rm .github/workflows/transactions-performance-patch.yml
          git config user.name "Jamal's Finance Performance"
          git config user.email "actions@users.noreply.github.com"
          git add app/dashboard/transactions/page.tsx components/transactions/TransactionRow.tsx .github/workflows/transactions-performance-patch.yml
          git diff --cached --check
          git commit -m "perf(transactions): remove unused reads and lazy-load editor"
          git push origin HEAD:transactions-performance-staging
