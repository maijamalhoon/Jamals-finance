name: Category marker test diagnostics

on:
  push:
    branches:
      - feat/responsive-marker-category-icons
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Capture test output
        id: tests
        shell: bash
        run: |
          set +e
          npm test > category-marker-tests.txt 2>&1
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: category-marker-tests
          path: category-marker-tests.txt
          if-no-files-found: error
          retention-days: 1

      - name: Fail when tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
