name: Package main source

on:
  push:
    branches:
      - feat/responsive-marker-category-icons

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-main-source
          path: .
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
