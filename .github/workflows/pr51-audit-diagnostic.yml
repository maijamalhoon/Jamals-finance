name: PR51 dependency repair

on:
  push:
    branches:
      - security/free-leaked-password-protection

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out feature branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: security/free-leaked-password-protection
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Install repaired dependency graph
        run: npm ci --silent

      - name: Enforce zero known dependency vulnerabilities
        run: npm audit --audit-level=low

      - name: Validate application
        run: |
          npm run check
          npm run build

      - name: Commit repaired lockfile
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "Lockfile already matches the secure dependency graph."
            exit 0
          fi
          git commit -m "security(deps): regenerate patched lockfile"
          git push origin HEAD:security/free-leaked-password-protection
