name: PR51 dependency audit diagnostic

on:
  push:
    branches:
      - security/free-leaked-password-protection

permissions:
  contents: read

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out feature branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: security/free-leaked-password-protection
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Capture dependency audit
        shell: bash
        run: |
          npm ci --silent
          set +e
          npm audit --json > audit.json
          exit 0

      - name: Upload dependency audit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr51-dependency-audit
          path: audit.json
          if-no-files-found: error
          retention-days: 1
