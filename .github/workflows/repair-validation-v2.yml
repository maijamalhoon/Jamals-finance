name: Repair validation contracts v2

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

concurrency:
  group: repair-validation-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out current validation branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: validation-staging-v2
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Run asserted contract repair script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/ci.yml').read_text(encoding='utf-8')
          opening = "          python - <<'PY'\n"
          start = workflow.index(opening) + len(opening)
          end = workflow.index("\n          PY\n", start)
          script = textwrap.dedent(workflow[start:end])
          exec(compile(script, 'repair-contracts.py', 'exec'))
          PY

      - name: Restore standard CI and remove temporary workflows
        shell: bash
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm .github/workflows/repair-validation-v2.yml
          git config user.name "Jamal's Finance Validation"
          git config user.email "actions@users.noreply.github.com"
          git add lib .github/workflows/ci.yml .github/workflows/repair-validation-v2.yml
          git diff --cached --check
          git commit -m "test(validation): align source contracts with current architecture"
          git push origin HEAD:validation-staging-v2
