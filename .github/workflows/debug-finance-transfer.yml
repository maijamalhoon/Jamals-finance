name: Debug finance transfer

on:
  push:
    branches:
      - agent/complete-finance-data-transfer

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies quietly
        run: npm ci --silent
      - name: Print typecheck and lint diagnostics
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          typecheck_status=$?
          npm run lint > /tmp/lint.log 2>&1
          lint_status=$?
          echo "===== TYPECHECK ====="
          cat /tmp/typecheck.log
          echo "===== LINT ====="
          cat /tmp/lint.log
          if [ "$typecheck_status" -ne 0 ] || [ "$lint_status" -ne 0 ]; then
            exit 1
          fi
