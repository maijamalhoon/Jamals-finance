name: Debug finance transfer

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: false
    steps:
      - name: Verify finance transfer scope
        shell: bash
        run: |
          set -e
          git clone --quiet --depth 1 --branch "$GITHUB_HEAD_REF" https://github.com/maijamalhoon/Jamals-finance.git repo
          cd repo
          npm ci --silent
          echo "===== TYPECHECK ====="
          npm run typecheck
          echo "===== TARGETED LINT ====="
          npx eslint \
            components/data/FinanceDataTransfer.tsx \
            components/settings/SettingsDataTransferSection.tsx \
            lib/data-backup.ts \
            lib/data-backup.test.ts
          echo "===== BACKUP TESTS ====="
          npx vitest run lib/data-backup.test.ts
