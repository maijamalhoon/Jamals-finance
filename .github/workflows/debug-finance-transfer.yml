name: Debug finance transfer

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: false
    steps:
      - name: Print typecheck and lint diagnostics
        shell: bash
        run: |
          set +e
          git clone --quiet --depth 1 --branch "$GITHUB_HEAD_REF" https://github.com/maijamalhoon/Jamals-finance.git repo
          cd repo || exit 1
          npm ci --silent
          npm run typecheck > /tmp/typecheck.log 2>&1
          typecheck_status=$?
          npm run lint > /tmp/lint.log 2>&1
          lint_status=$?
          echo "===== TYPECHECK ====="
          cat /tmp/typecheck.log
          echo "===== LINT ====="
          cat /tmp/lint.log
          if [ "$typecheck_status" -ne 0 ] || [ "$lint_status" -ne 0 ]; then
            exit 1
          fi
