name: Apply category manager v2 direct bundle

on:
  push:
    branches:
      - feat/category-manager-v2-direct
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/category-manager-v2-direct
          fetch-depth: 0

      - name: Diagnose xz source bundle
        shell: bash
        run: |
          set +e
          {
            echo "HEAD=$(git rev-parse HEAD)"
            ls -la .automation
            wc -c .automation/category-v2.bundle.part* || true
            cat .automation/category-v2.bundle.part* > /tmp/category-v2-files.tar.xz.b64
            echo "cat_status=$?"
            wc -c /tmp/category-v2-files.tar.xz.b64
            base64 --decode /tmp/category-v2-files.tar.xz.b64 > /tmp/category-v2-files.tar.xz
            echo "decode_status=$?"
            wc -c /tmp/category-v2-files.tar.xz
            sha256sum /tmp/category-v2-files.tar.xz
            echo "15ef6d27f1d02b2b6a909d7c89783abff7b583e515a9e104fa7f732dd63f3ae3  /tmp/category-v2-files.tar.xz" | sha256sum --check
            echo "checksum_status=$?"
            tar --list --xz --file /tmp/category-v2-files.tar.xz
            echo "tar_status=$?"
          } > /tmp/category-v2-xz-diagnostics.txt 2>&1
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: category-v2-xz-diagnostics
          path: /tmp/category-v2-xz-diagnostics.txt
          if-no-files-found: error
          retention-days: 1
