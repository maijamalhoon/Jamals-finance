name: Apply category manager v2 direct bundle

on:
  push:
    branches:
      - feat/category-manager-v2-direct
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/category-manager-v2-direct
          fetch-depth: 0

      - name: Apply verified source bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .automation/category-v2.bundle.part* > /tmp/category-v2-files.tar.xz.b64
          base64 --decode /tmp/category-v2-files.tar.xz.b64 > /tmp/category-v2-files.tar.xz
          echo "15ef6d27f1d02b2b6a909d7c89783abff7b583e515a9e104fa7f732dd63f3ae3  /tmp/category-v2-files.tar.xz" | sha256sum --check
          tar --extract --xz --file /tmp/category-v2-files.tar.xz --directory .
          rm -f .automation/category-v2.bundle.part*
          rm -f .automation/category-v2.bundle.ready
          rm -f .automation/category-v2-bundle-diagnostics.txt
          rm -f .github/workflows/apply-category-manager-v2-direct.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(categories): rebuild clean manager and secure backend"
          git push origin HEAD:feat/category-manager-v2-direct
