name: Apply category manager v2 direct bundle

on:
  push:
    branches:
      - feat/category-manager-v2-direct
    paths:
      - ".automation/category-v2.bundle.ready"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/category-manager-v2-direct
          fetch-depth: 0

      - name: Apply prepared source bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .automation/category-v2.bundle.part* > /tmp/category-v2-files.tar.gz.b64
          base64 --decode /tmp/category-v2-files.tar.gz.b64 > /tmp/category-v2-files.tar.gz
          echo "3003836f493bce7db3bc99b4144ade0ff197b3b428057d121b57e2e8240af17c  /tmp/category-v2-files.tar.gz" | sha256sum --check
          tar --extract --gzip --file /tmp/category-v2-files.tar.gz --directory .
          rm -f .automation/category-v2.bundle.part*
          rm -f .automation/category-v2.bundle.ready
          rm -f .github/workflows/apply-category-manager-v2-direct.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(categories): rebuild clean manager and secure backend"
          git push origin HEAD:feat/category-manager-v2-direct
