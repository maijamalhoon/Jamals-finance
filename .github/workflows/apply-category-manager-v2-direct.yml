name: Apply category manager v2 direct bundle

on:
  push:
    branches:
      - feat/category-manager-v2-direct
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/category-manager-v2-direct
          fetch-depth: 0

      - name: Diagnose prepared source bundle
        shell: bash
        run: |
          set +e
          {
            echo "HEAD=$(git rev-parse HEAD)"
            ls -la .automation
            wc -c .automation/category-v2.bundle.part* || true
            cat .automation/category-v2.bundle.part* > /tmp/category-v2-files.tar.gz.b64
            echo "cat_status=$?"
            wc -c /tmp/category-v2-files.tar.gz.b64
            base64 --decode /tmp/category-v2-files.tar.gz.b64 > /tmp/category-v2-files.tar.gz
            echo "decode_status=$?"
            wc -c /tmp/category-v2-files.tar.gz
            sha256sum /tmp/category-v2-files.tar.gz
            echo "3003836f493bce7db3bc99b4144ade0ff197b3b428057d121b57e2e8240af17c  /tmp/category-v2-files.tar.gz" | sha256sum --check
            echo "checksum_status=$?"
            tar --list --gzip --file /tmp/category-v2-files.tar.gz
            echo "tar_status=$?"
          } > .automation/category-v2-bundle-diagnostics.txt 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .automation/category-v2-bundle-diagnostics.txt
          git commit -m "chore: capture category bundle diagnostics"
          git push origin HEAD:feat/category-manager-v2-direct
