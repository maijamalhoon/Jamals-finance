name: Currency quality gate

on:
  push:
    branches: [main]
    paths:
      - "lib/currency.ts"
      - "lib/currency-input.ts"
      - "lib/exchange-rate.ts"
      - "lib/supabase/client.ts"
      - "lib/investments/**"
      - "components/currency/**"
      - "components/settings/**"
      - "components/accounts/**"
      - "components/dashboard/**"
      - "components/goals/**"
      - "components/payables/**"
      - "components/investments/**"
      - "components/reports/**"
      - "app/api/exchange-rate/**"
      - "app/dashboard/**"
      - "supabase/migrations/**"
      - ".github/workflows/currency-quality-gate.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "lib/currency.ts"
      - "lib/currency-input.ts"
      - "lib/exchange-rate.ts"
      - "lib/supabase/client.ts"
      - "lib/investments/**"
      - "components/currency/**"
      - "components/settings/**"
      - "components/accounts/**"
      - "components/dashboard/**"
      - "components/goals/**"
      - "components/payables/**"
      - "components/investments/**"
      - "components/reports/**"
      - "app/api/exchange-rate/**"
      - "app/dashboard/**"
      - "supabase/migrations/**"
      - ".github/workflows/currency-quality-gate.yml"

permissions:
  contents: read

concurrency:
  group: currency-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install dependencies
        run: npm ci --silent

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Typecheck
        run: npm run typecheck

      - name: Test currency conversions
        run: npx vitest run lib/currency.test.ts

      - name: Build production application
        run: npm run build
