name: Apply password protection patches

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'security/free-leaked-password-protection'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Apply deterministic source patches
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/apply-password-protection-patches.mjs 2>&1 | tee password-patch.log

      - name: Upload patch diagnostics
        if: steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: password-patch-diagnostics
          path: password-patch.log
          retention-days: 1

      - name: Fail when patching failed
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Commit patched sources
        if: steps.patch.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: enforce breached-password protection across auth flows"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
