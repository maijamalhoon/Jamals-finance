name: Apply password protection patches

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'security/free-leaked-password-protection'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Apply deterministic source patches
        run: node scripts/apply-password-protection-patches.mjs

      - name: Commit patched sources
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: enforce breached-password protection across auth flows"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
