name: Apply category manager v2 patch

on:
  push:
    branches:
      - feat/category-manager-v2
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/category-manager-v2
          fetch-depth: 0

      - name: Diagnose prepared patch
        shell: bash
        run: |
          set -uo pipefail
          cat .automation/category-v2.part0* > /tmp/category-v2.patch.gz.b64
          base64 --decode /tmp/category-v2.patch.gz.b64 > /tmp/category-v2.patch.gz
          gzip --decompress --stdout /tmp/category-v2.patch.gz > /tmp/category-v2.patch
          {
            echo "HEAD=$(git rev-parse HEAD)"
            wc -c /tmp/category-v2.patch.gz.b64 /tmp/category-v2.patch.gz /tmp/category-v2.patch
            sha256sum /tmp/category-v2.patch.gz.b64 /tmp/category-v2.patch.gz /tmp/category-v2.patch
            git apply --check --3way /tmp/category-v2.patch
            echo "apply_status=$?"
          } > .automation/category-v2-diagnostics.txt 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .automation/category-v2-diagnostics.txt
          git commit -m "chore: capture category patch diagnostics"
          git push origin HEAD:feat/category-manager-v2
