name: Password protection integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    if: github.head_ref == 'security/free-leaked-password-protection'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install and build
        run: |
          npm ci --silent
          npm run build

      - name: Start production server
        shell: bash
        run: |
          npm start -- --hostname 127.0.0.1 --port 3000 > password-server.log 2>&1 &
          echo $! > password-server.pid
          for attempt in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat password-server.log
          exit 1

      - name: Verify password protection route
        shell: bash
        run: |
          set -euo pipefail
          endpoint="http://127.0.0.1:3000/api/security/password-check"

          weak_status=$(curl --silent --output weak-response.json --write-out '%{http_code}' \
            --request POST --header 'Content-Type: application/json' \
            --data '{"password":"weak"}' "$endpoint")
          test "$weak_status" = "422"

          compromised_status=$(curl --silent --output compromised-response.json --write-out '%{http_code}' \
            --request POST --header 'Content-Type: application/json' \
            --data '{"password":"Password123!"}' "$endpoint")
          test "$compromised_status" = "409"

          safe_password="Jf-$(cat /proc/sys/kernel/random/uuid)-2026!"
          safe_payload=$(node -e 'process.stdout.write(JSON.stringify({password: process.argv[1]}))' "$safe_password")
          safe_status=$(curl --silent --output safe-response.json --write-out '%{http_code}' \
            --request POST --header 'Content-Type: application/json' \
            --data "$safe_payload" "$endpoint")
          test "$safe_status" = "200"

          cross_origin_status=$(curl --silent --output cross-origin-response.json --write-out '%{http_code}' \
            --request POST --header 'Content-Type: application/json' \
            --header 'Origin: https://attacker.invalid' \
            --data '{"password":"Password123!"}' "$endpoint")
          test "$cross_origin_status" = "403"

          echo "Password route integration passed: weak=$weak_status compromised=$compromised_status safe=$safe_status cross-origin=$cross_origin_status"

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: password-protection-integration-log
          path: password-server.log
          retention-days: 1
