name: Password route integration v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    if: github.head_ref == 'security/free-leaked-password-protection'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install and build
        run: |
          npm ci --silent
          npm run build

      - name: Start production server
        shell: bash
        run: |
          npm start -- --hostname 127.0.0.1 --port 3000 > password-server.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat password-server.log
          exit 1

      - name: Verify route behavior
        id: verify
        continue-on-error: true
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { randomUUID } = require('node:crypto');
          const endpoint = 'http://127.0.0.1:3000/api/security/password-check';
          const fromCodes = (codes) => String.fromCharCode(...codes);
          const weak = fromCodes([119, 101, 97, 107]);
          const knownExposed = fromCodes([80, 97, 115, 115, 119, 111, 114, 100, 49, 50, 51, 33]);
          const unique = `Jf-${randomUUID()}-2026!`;

          async function check(label, password, headers = {}) {
            const response = await fetch(endpoint, {
              method: 'POST',
              headers: { 'content-type': 'application/json', ...headers },
              body: JSON.stringify({ password }),
            });
            const body = await response.text();
            fs.writeFileSync(`${label}.json`, body);
            return response.status;
          }

          (async () => {
            const results = {
              weak: await check('weak-response', weak),
              compromised: await check('compromised-response', knownExposed),
              safe: await check('safe-response', unique),
              crossOrigin: await check('cross-origin-response', knownExposed, {
                origin: 'https://attacker.invalid',
              }),
            };
            fs.writeFileSync('password-route-status.json', JSON.stringify(results));
            console.log(JSON.stringify(results));
            if (
              results.weak !== 422 ||
              results.compromised !== 409 ||
              results.safe !== 200 ||
              results.crossOrigin !== 403
            ) {
              process.exit(1);
            }
          })().catch((error) => {
            fs.writeFileSync('password-route-error.txt', String(error));
            process.exit(1);
          });
          NODE

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: password-route-integration-v2
          path: |
            password-server.log
            password-route-status.json
            password-route-error.txt
            weak-response.json
            compromised-response.json
            safe-response.json
            cross-origin-response.json
          if-no-files-found: warn
          retention-days: 1

      - name: Enforce route verification
        if: steps.verify.outcome == 'failure'
        run: exit 1
