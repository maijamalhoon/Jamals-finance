name: Budgeting state hardening

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/budgeting-state-hardening-once.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: build-verification-placeholder
      NEXT_PUBLIC_SITE_URL: https://jamals-finance-sable.vercel.app
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Apply exact state hardening patches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workspace = Path('components/business/BusinessBudgetingWorkspace.tsx')
          source = workspace.read_text()
          source = source.replace(
              'import { type FormEvent, type ReactNode, useMemo, useState } from "react";',
              'import { type FormEvent, type ReactNode, useEffect, useMemo, useState } from "react";',
              1,
          )
          marker = '''  const [copyForm, setCopyForm] = useState({
    name: selectedScenario ? `${selectedScenario.name} Copy` : "",
    type: selectedScenario?.scenario_type ?? ("forecast" as "budget" | "forecast"),
    adjustment: "0",
    actualsThrough: selectedScenario?.actuals_through ?? today,
  });
'''
          replacement = marker + '''
  useEffect(() => {
    setValues(initialValues);
  }, [initialValues, selectedId]);

  useEffect(() => {
    setCopyForm(
      selectedScenario
        ? {
            name: `${selectedScenario.name} Copy`,
            type: selectedScenario.scenario_type,
            adjustment: "0",
            actualsThrough: selectedScenario.actuals_through ?? today,
          }
        : {
            name: "",
            type: "forecast",
            adjustment: "0",
            actualsThrough: today,
          },
    );
  }, [selectedId, today]);
'''
          if marker not in source:
              raise SystemExit('Budgeting state marker not found')
          source = source.replace(marker, replacement, 1)
          workspace.write_text(source)

          panel = Path('components/business/BusinessFinancialPermissionPanel.tsx')
          source = panel.read_text()
          source = source.replace(
              'const [permissions, setPermissions] = useState(member.permissions.filter((permission) => permission !== "*"));',
              'const [permissions, setPermissions] = useState(member.permissions);',
              1,
          )
          source = source.replace(
              'setPermissions(member.permissions.filter((permission) => permission !== "*"));',
              'setPermissions(member.permissions);',
              1,
          )
          source = source.replace(
              '  const isSelf = member.user_id === currentUserId;\n',
              '  const isSelf = member.user_id === currentUserId;\n  const hasWildcard = permissions.includes("*");\n',
              1,
          )
          source = source.replace(
              '    if (!permissionCatalog.includes(permission)) return;',
              '    if (hasWildcard || !permissionCatalog.includes(permission)) return;',
              1,
          )
          source = source.replace(
              '{isSelf ? <span className="rounded-full bg-primary-soft px-2 py-0.5 text-[11px] font-black text-primary">You</span> : null}',
              '{isSelf ? <span className="rounded-full bg-primary-soft px-2 py-0.5 text-[11px] font-black text-primary">You</span> : null}\n            {hasWildcard ? <span className="rounded-full bg-success-soft px-2 py-0.5 text-[11px] font-black text-success">Full access</span> : null}',
              1,
          )
          source = source.replace(
              'const checked = permissions.includes(value);',
              'const checked = hasWildcard || permissions.includes(value);',
              1,
          )
          source = source.replace(
              'disabled={!available || saving}',
              'disabled={!available || saving || hasWildcard}',
              1,
          )
          source = source.replace(
              '<Button type="button" size="sm" loading={saving} loadingLabel="Saving…" onClick={() => void save()}>',
              '<Button type="button" size="sm" disabled={hasWildcard} loading={saving} loadingLabel="Saving…" onClick={() => void save()}>',
              1,
          )
          panel.write_text(source)
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build latest application
        run: npm run build

      - name: Commit verified patch and remove workflow
        shell: bash
        run: |
          rm .github/workflows/budgeting-state-hardening-once.yml
          printf 'status=success\nverified_source=%s\n' "$(git rev-parse HEAD)" > budgeting-state-hardening-result.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/business/BusinessBudgetingWorkspace.tsx components/business/BusinessFinancialPermissionPanel.tsx budgeting-state-hardening-result.txt .github/workflows/budgeting-state-hardening-once.yml
          git commit -m "fix(budgeting): synchronize scenario and wildcard access state"
          git push origin HEAD:main
