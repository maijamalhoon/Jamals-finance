name: Apply financial delete logic fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-financial-delete-logic-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Patch active-ledger calculations and deletion RPCs
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text()

          def write(path: str, text: str) -> None:
              Path(path).write_text(text)

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old!r}")
              write(path, text.replace(old, new, 1))

          def replace_count(path: str, old: str, new: str, expected: int) -> None:
              text = read(path)
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f"{path}: expected {expected} matches, found {count}: {old!r}")
              write(path, text.replace(old, new))

          # Dashboard: every active total, chart, recent list, and setup count ignores deleted ledger rows.
          replace_once(
              "app/dashboard/page.tsx",
              '      .gte("date", ranges.query.start)\n',
              '      .is("deleted_at", null)\n      .gte("date", ranges.query.start)\n',
          )
          replace_once(
              "app/dashboard/page.tsx",
              '      .order("date", { ascending: false })\n      .order("created_at", { ascending: false })\n      .limit(12),\n    supabase\n      .from("account_transfers")',
              '      .is("deleted_at", null)\n      .order("date", { ascending: false })\n      .order("created_at", { ascending: false })\n      .limit(12),\n    supabase\n      .from("account_transfers")',
          )
          replace_once(
              "app/dashboard/page.tsx",
              '      .order("transfer_date", { ascending: false })\n      .order("created_at", { ascending: false })\n      .limit(12),',
              '      .is("deleted_at", null)\n      .order("transfer_date", { ascending: false })\n      .order("created_at", { ascending: false })\n      .limit(12),',
          )
          replace_once(
              "app/dashboard/page.tsx",
              '      .eq("type", "income"),',
              '      .eq("type", "income")\n      .is("deleted_at", null),',
          )
          replace_once(
              "app/dashboard/page.tsx",
              '      .eq("type", "expense"),',
              '      .eq("type", "expense")\n      .is("deleted_at", null),',
          )

          # Analytics and reports must only calculate from financially active rows.
          replace_once(
              "app/dashboard/analytics/page.tsx",
              '      .gte("date", queryRange.start)\n',
              '      .is("deleted_at", null)\n      .gte("date", queryRange.start)\n',
          )
          replace_once(
              "app/dashboard/analytics/page.tsx",
              '    supabase.from("transactions").select("id", { count: "exact", head: true }),',
              '    supabase\n      .from("transactions")\n      .select("id", { count: "exact", head: true })\n      .is("deleted_at", null),',
          )
          replace_once(
              "app/dashboard/reports/page.tsx",
              '      .gte("date", range.start)\n',
              '      .is("deleted_at", null)\n      .gte("date", range.start)\n',
          )
          replace_once(
              "app/dashboard/reports/page.tsx",
              '      .gte("transfer_date", range.start)\n',
              '      .is("deleted_at", null)\n      .gte("transfer_date", range.start)\n',
          )

          # AI summary fallback previously included deleted rows even though exact chat did not.
          replace_count(
              "app/api/ai-insights/route.ts",
              '      .gte("date", oldestTrendStart)\n',
              '      .is("deleted_at", null)\n      .gte("date", oldestTrendStart)\n',
              2,
          )

          # CSV reports and account analytics must match dashboard mathematics.
          replace_once(
              "components/reports/ExportButton.tsx",
              '          .order("date", { ascending: false });',
              '          .is("deleted_at", null)\n          .order("date", { ascending: false });',
          )
          replace_once(
              "components/reports/ExportButton.tsx",
              '          .order("transfer_date", { ascending: false });',
              '          .is("deleted_at", null)\n          .order("transfer_date", { ascending: false });',
          )
          replace_once(
              "app/dashboard/accounts/page.tsx",
              '    supabase.from("transactions").select("account_id, type, amount"),',
              '    supabase\n      .from("transactions")\n      .select("account_id, type, amount")\n      .is("deleted_at", null),',
          )
          replace_once(
              "app/dashboard/accounts/[id]/page.tsx",
              '      .eq("account_id", id)\n      .order("date", { ascending: false })',
              '      .eq("account_id", id)\n      .is("deleted_at", null)\n      .order("date", { ascending: false })',
          )
          replace_once(
              "app/dashboard/accounts/[id]/page.tsx",
              '      .or(`from_account_id.eq.${id},to_account_id.eq.${id}`)\n      .order("transfer_date", { ascending: false })',
              '      .or(`from_account_id.eq.${id},to_account_id.eq.${id}`)\n      .is("deleted_at", null)\n      .order("transfer_date", { ascending: false })',
          )

          # Settings statistics and category usage should describe active finance data, not deleted history.
          replace_once(
              "app/dashboard/settings/page.tsx",
              '      .select("category_id")\n      .eq("user_id", user.id),',
              '      .select("category_id")\n      .eq("user_id", user.id)\n      .is("deleted_at", null),',
          )
          replace_once(
              "app/dashboard/settings/page.tsx",
              '      .select("id", { count: "exact", head: true })\n      .eq("user_id", user.id),\n    supabase\n      .from("goals")',
              '      .select("id", { count: "exact", head: true })\n      .eq("user_id", user.id)\n      .is("deleted_at", null),\n    supabase\n      .from("goals")',
          )

          # Use atomic database functions for generic transaction and transfer deletion.
          old_delete = '''  async function softDeleteLedgerRow() {
              const tableName = type === "transfer" ? "account_transfers" : "transactions";
              const { error } = await supabase
                .from(tableName)
                .update({ deleted_at: new Date().toISOString() })
                .eq("id", tx.id)
                .is("deleted_at", null);
              if (error) throw error;
            }
          '''
          new_delete = '''  async function softDeleteLedgerRow() {
              const functionName =
                type === "transfer"
                  ? "soft_delete_account_transfer"
                  : "soft_delete_transaction";
              const args =
                type === "transfer"
                  ? { p_transfer_id: tx.id }
                  : { p_transaction_id: tx.id };
              const { data, error } = await supabase.rpc(functionName, args);
              if (error) throw error;
              if (!data) throw new Error("The ledger row was not deleted.");
            }
          '''
          replace_once("components/transactions/TransactionRow.tsx", old_delete, new_delete)

          migration = '''-- Deleted ledger rows remain available as history, but must never affect live finance math.
          -- These RPCs make deletion atomic, ownership-checked, and guaranteed to run the balance triggers.

          create or replace function public.soft_delete_transaction(p_transaction_id uuid)
          returns uuid
          language plpgsql
          security definer
          set search_path = pg_catalog
          as $$
          declare
            current_user_id uuid := auth.uid();
            archived_at timestamptz;
          begin
            if current_user_id is null then
              raise exception 'Please sign in again before deleting this transaction.';
            end if;

            select transaction.deleted_at
            into archived_at
            from public.transactions transaction
            where transaction.id = p_transaction_id
              and transaction.user_id = current_user_id
            for update;

            if not found then
              raise exception 'Transaction not found.';
            end if;

            if archived_at is null then
              update public.transactions transaction
              set deleted_at = now()
              where transaction.id = p_transaction_id
                and transaction.user_id = current_user_id
                and transaction.deleted_at is null;
            end if;

            return p_transaction_id;
          end;
          $$;

          create or replace function public.soft_delete_account_transfer(p_transfer_id uuid)
          returns uuid
          language plpgsql
          security definer
          set search_path = pg_catalog
          as $$
          declare
            current_user_id uuid := auth.uid();
            archived_at timestamptz;
          begin
            if current_user_id is null then
              raise exception 'Please sign in again before deleting this transfer.';
            end if;

            select transfer.deleted_at
            into archived_at
            from public.account_transfers transfer
            where transfer.id = p_transfer_id
              and transfer.user_id = current_user_id
            for update;

            if not found then
              raise exception 'Transfer not found.';
            end if;

            if archived_at is null then
              update public.account_transfers transfer
              set deleted_at = now()
              where transfer.id = p_transfer_id
                and transfer.user_id = current_user_id
                and transfer.deleted_at is null;
            end if;

            return p_transfer_id;
          end;
          $$;

          -- Reinstall the balance triggers explicitly so a soft-delete transition always reverses
          -- the original account effect exactly once.
          drop trigger if exists sync_account_balance_after_transaction_change on public.transactions;
          create trigger sync_account_balance_after_transaction_change
          after insert or update or delete on public.transactions
          for each row execute function public.sync_account_balance_from_transaction();

          drop trigger if exists trg_account_transfers_apply_balance on public.account_transfers;
          create trigger trg_account_transfers_apply_balance
          after insert or update or delete on public.account_transfers
          for each row execute function public.apply_account_transfer_balance();

          revoke all on function public.soft_delete_transaction(uuid) from public, anon;
          revoke all on function public.soft_delete_account_transfer(uuid) from public, anon;
          grant execute on function public.soft_delete_transaction(uuid) to authenticated;
          grant execute on function public.soft_delete_account_transfer(uuid) to authenticated;
          '''
          migration_path = Path(
              "supabase/migrations/20260720182000_exclude_deleted_ledger_from_financial_math.sql"
          )
          if migration_path.exists():
              raise SystemExit(f"Migration already exists: {migration_path}")
          migration_path.write_text(migration)
          PY

      - name: Install dependencies
        run: npm ci

      - name: Validate finance logic changes
        run: npm run check

      - name: Commit verified fix and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-financial-delete-logic-fix.yml
          git add app components supabase/migrations
          git commit -m "Fix deleted transaction financial calculations"
          git push origin main
