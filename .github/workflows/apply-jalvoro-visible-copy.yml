name: Apply JALVORO visible copy migration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/finish-jalvoro-visible-copy'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out migration branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/finish-jalvoro-visible-copy
          fetch-depth: 1

      - name: Diagnose centralized brand patch
        shell: bash
        run: |
          set -u
          base64 --decode .github/jalvoro-visible-copy.patch.gz.b64 | gzip -d > /tmp/jalvoro-visible-copy.patch
          git apply --check --verbose /tmp/jalvoro-visible-copy.patch > patch-diagnostic.txt 2>&1
          echo $? > patch-status.txt
          cat patch-diagnostic.txt

      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jalvoro-patch-diagnostic
          path: |
            patch-diagnostic.txt
            patch-status.txt
          if-no-files-found: error
          retention-days: 1
