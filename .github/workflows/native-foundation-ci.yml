name: Native foundation CI

on:
  push:
    branches: [main]
    paths:
      - "native/**"
      - ".github/workflows/native-foundation-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-and-shared:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
      - name: Run shared tests and compile Android
        run: gradle :shared:testAndroidHostTest :androidApp:assembleDebug --stacktrace
      - name: Upload native debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-native-foundation-debug
          path: native/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          if-no-files-found: error
          retention-days: 7
      - name: Record native CI result
        if: always()
        working-directory: .
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          cat > .github/native-ci-status.json <<JSON
          {
            "status": "${JOB_STATUS}",
            "runId": "${GITHUB_RUN_ID}",
            "commit": "${GITHUB_SHA}",
            "workflow": "native-foundation-ci"
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/native-ci-status.json
          git commit -m "chore(native): record foundation CI ${JOB_STATUS}" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
