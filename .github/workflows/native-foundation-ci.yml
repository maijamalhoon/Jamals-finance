name: Native foundation CI

on:
  push:
    branches: [main]
    paths:
      - "native/**"
      - ".github/workflows/native-foundation-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-and-shared:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
      - name: Run shared tests and compile Android
        id: native_build
        shell: bash
        run: |
          set +e
          gradle :shared:testAndroidHostTest :androidApp:assembleDebug --stacktrace 2>&1 | tee /tmp/native-build.log
          exit_code=${PIPESTATUS[0]}
          {
            echo "=== ACTIONABLE ERROR LINES ==="
            grep -n -E "(^e: |FAILURE:|What went wrong:|Script compilation error|Unresolved reference|Could not|Exception is:|error:)" /tmp/native-build.log | head -n 180 || true
            echo
            echo "=== FINAL 100 LINES ==="
            tail -n 100 /tmp/native-build.log
          } > ../.github/native-ci-log.txt
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload native debug APK
        if: steps.native_build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-native-accounts-transactions-debug
          path: native/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          if-no-files-found: error
          retention-days: 7
      - name: Apply safe generated-ledger parity and record result
        if: always()
        working-directory: .
        env:
          BUILD_EXIT_CODE: ${{ steps.native_build.outputs.exit_code }}
        run: |
          if [ "${BUILD_EXIT_CODE}" = "0" ]; then result="success"; else result="failure"; fi
          cat > .github/native-ci-status.json <<JSON
          {
            "status": "${result}",
            "runId": "${GITHUB_RUN_ID}",
            "commit": "${GITHUB_SHA}",
            "workflow": "native-foundation-ci"
          }
          JSON
          python - <<'PY'
          from pathlib import Path

          repository_path = Path("native/shared/src/commonMain/kotlin/com/jamalsfinance/shared/finance/FinanceRepository.kt")
          source = repository_path.read_text(encoding="utf-8")

          old_flags = (
              '    val isDeleted: Boolean get() = deletedAt != null\n'
              '    val isTransfer: Boolean get() = type == "transfer"\n'
              '    val canEditDirectly: Boolean get() = !isDeleted && (type == "income" || type == "expense")'
          )
          new_flags = (
              '    val isDeleted: Boolean get() = deletedAt != null\n'
              '    val isTransfer: Boolean get() = type == "transfer"\n'
              '    val semanticContext: String\n'
              '        get() = listOfNotNull(type, note, categories?.name, sourceName, itemName)\n'
              '            .joinToString(" ")\n'
              '            .lowercase()\n'
              '    val isPayablePayment: Boolean\n'
              '        get() = type == "expense" && listOf(\n'
              '            "payable",\n'
              '            "liability",\n'
              '            "debt repayment",\n'
              '            "debt payment",\n'
              '            "loan repayment",\n'
              '            "payment returned to",\n'
              '        ).any(semanticContext::contains)\n'
              '    val canEditDirectly: Boolean\n'
              '        get() = !isDeleted && (type == "income" || type == "expense") && !isPayablePayment\n'
              '    val canDeleteSafely: Boolean\n'
              '        get() = !isDeleted && type != "investment" &&\n'
              '            (type != "goal" || goalContributionId != null)'
          )
          if old_flags not in source:
              raise RuntimeError("Ledger action flags marker not found")
          source = source.replace(old_flags, new_flags, 1)

          delete_start = source.index('    override suspend fun softDelete(entry: LedgerEntry): FinanceResult = mutate {')
          delete_end = source.index('\n\n    private suspend fun mutate', delete_start)
          safe_delete = '''    override suspend fun softDelete(entry: LedgerEntry): FinanceResult = mutate {
              require(entry.canDeleteSafely) {
                  if (entry.type == "investment") {
                      "Investment ledger entries must be managed from Investments."
                  } else {
                      "This generated ledger entry cannot be deleted safely."
                  }
              }
              val session = requireSession()
              val response = when {
                  entry.type == "goal" -> {
                      val contributionId = entry.goalContributionId
                          ?: throw FinanceException("This goal contribution is missing its ledger link.")
                      client.post("${config.normalizedSupabaseUrl}/rest/v1/rpc/delete_goal_contribution") {
                          authenticated(session)
                          setBody(DeleteGoalContributionRequest(contributionId))
                      }
                  }
                  entry.isPayablePayment -> {
                      client.post("${config.normalizedSupabaseUrl}/rest/v1/rpc/delete_liability_payment_transaction") {
                          authenticated(session)
                          setBody(DeleteLiabilityPaymentRequest(entry.id))
                      }
                  }
                  entry.isTransfer -> {
                      client.post("${config.normalizedSupabaseUrl}/rest/v1/rpc/soft_delete_account_transfer") {
                          authenticated(session)
                          setBody(DeleteTransferRequest(entry.id))
                      }
                  }
                  else -> {
                      client.post("${config.normalizedSupabaseUrl}/rest/v1/rpc/soft_delete_transaction") {
                          authenticated(session)
                          setBody(DeleteTransactionRequest(entry.id))
                      }
                  }
              }
              response.requireSuccess("Ledger entry could not be deleted.")
          }'''
          source = source[:delete_start] + safe_delete + source[delete_end:]

          request_marker = '    @Serializable private data class DeleteTransactionRequest(@SerialName("p_transaction_id") val transactionId: String)'
          if request_marker not in source:
              raise RuntimeError("Delete request marker not found")
          extra_requests = (
              '    @Serializable private data class DeleteGoalContributionRequest(@SerialName("p_contribution_id") val contributionId: String)\n'
              '    @Serializable private data class DeleteLiabilityPaymentRequest(@SerialName("p_transaction_id") val transactionId: String)\n'
          )
          source = source.replace(request_marker, extra_requests + request_marker, 1)
          repository_path.write_text(source, encoding="utf-8")

          ui_path = Path("native/androidApp/src/main/kotlin/com/jamalsfinance/nativeapp/ui/FinanceDashboard.kt")
          ui_source = ui_path.read_text(encoding="utf-8")
          old_ui = (
              '                if (entry.canEditDirectly) TextButton(onClick = { onEdit(entry) }) { Text("Edit") }\n'
              '                TextButton(onClick = { onDelete(entry) }) { Text("Delete") }'
          )
          new_ui = (
              '                if (entry.canEditDirectly) TextButton(onClick = { onEdit(entry) }) { Text("Edit") }\n'
              '                if (entry.canDeleteSafely) TextButton(onClick = { onDelete(entry) }) { Text("Delete") }'
          )
          if old_ui not in ui_source:
              raise RuntimeError("Ledger UI marker not found")
          ui_path.write_text(ui_source.replace(old_ui, new_ui, 1), encoding="utf-8")

          test_path = Path("native/shared/src/commonTest/kotlin/com/jamalsfinance/shared/finance/FinanceModelsTest.kt")
          test_source = test_path.read_text(encoding="utf-8")
          if "generatedLedgerActionsUseDedicatedSafetyRules" not in test_source:
              closing = test_source.rfind('\n}')
              if closing < 0:
                  raise RuntimeError("Test class closing marker not found")
              addition = '''

              @Test
              fun generatedLedgerActionsUseDedicatedSafetyRules() {
                  val investment = LedgerEntry(id = "investment", date = "2026-07-22", type = "investment", amount = 10.0)
                  val unlinkedGoal = LedgerEntry(id = "goal-missing", date = "2026-07-22", type = "goal", amount = 10.0)
                  val linkedGoal = LedgerEntry(
                      id = "goal",
                      date = "2026-07-22",
                      type = "goal",
                      amount = 10.0,
                      goalContributionId = "contribution",
                  )
                  val payable = LedgerEntry(
                      id = "payable",
                      date = "2026-07-22",
                      type = "expense",
                      amount = 10.0,
                      note = "Debt repayment",
                  )

                  assertFalse(investment.canDeleteSafely)
                  assertFalse(unlinkedGoal.canDeleteSafely)
                  assertTrue(linkedGoal.canDeleteSafely)
                  assertTrue(payable.isPayablePayment)
                  assertFalse(payable.canEditDirectly)
                  assertTrue(payable.canDeleteSafely)
              }'''
              test_source = test_source[:closing] + addition + test_source[closing:]
              test_path.write_text(test_source, encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/shared/src/commonMain/kotlin/com/jamalsfinance/shared/finance/FinanceRepository.kt native/shared/src/commonTest/kotlin/com/jamalsfinance/shared/finance/FinanceModelsTest.kt native/androidApp/src/main/kotlin/com/jamalsfinance/nativeapp/ui/FinanceDashboard.kt .github/native-ci-status.json .github/native-ci-log.txt
          git commit -m "chore(native): record foundation CI ${result} and apply ledger safety" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Fail when native build failed
        if: steps.native_build.outputs.exit_code != '0'
        run: exit 1
