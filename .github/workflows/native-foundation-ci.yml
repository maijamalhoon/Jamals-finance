name: Native release candidate CI

# Verification marker: release-candidate-v1.0.0-rc1
on:
  push:
    branches: [main, native-personal-v1.0-rc]
    paths:
      - "native/**"
      - ".github/workflows/native-foundation-ci.yml"
  workflow_dispatch:
    inputs:
      require_signed:
        description: "Fail unless the release AAB is signed with configured permanent-key secrets"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  android-and-shared:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Prepare optional permanent release signing
        id: signing
        working-directory: .
        env:
          KEYSTORE_BASE64: ${{ secrets.JAMALS_ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.JAMALS_ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.JAMALS_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.JAMALS_ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${KEYSTORE_BASE64}" ] && [ -n "${STORE_PASSWORD}" ] && \
             [ -n "${KEY_ALIAS}" ] && [ -n "${KEY_PASSWORD}" ]; then
            keystore_path="${RUNNER_TEMP}/jamals-finance-release.jks"
            printf '%s' "${KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
            chmod 600 "${keystore_path}"
            [ -s "${keystore_path}" ]
            echo "JAMALS_ANDROID_KEYSTORE_PATH=${keystore_path}" >> "${GITHUB_ENV}"
            echo "JAMALS_ANDROID_STORE_PASSWORD=${STORE_PASSWORD}" >> "${GITHUB_ENV}"
            echo "JAMALS_ANDROID_KEY_ALIAS=${KEY_ALIAS}" >> "${GITHUB_ENV}"
            echo "JAMALS_ANDROID_KEY_PASSWORD=${KEY_PASSWORD}" >> "${GITHUB_ENV}"
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Test, lint and build release candidate
        id: native_build
        shell: bash
        env:
          REQUIRE_SIGNED: ${{ github.event_name == 'workflow_dispatch' && inputs.require_signed || false }}
        run: |
          set +e
          gradle \
            :shared:testAndroidHostTest \
            :androidApp:lintDebug \
            :androidApp:lintRelease \
            :androidApp:assembleDebug \
            :androidApp:bundleRelease \
            --stacktrace 2>&1 | tee /tmp/native-build.log
          exit_code=${PIPESTATUS[0]}

          if [ "${exit_code}" = "0" ]; then
            OUTPUT_JSON=release-artifacts.json bash scripts/verify-release-artifacts.sh \
              2>&1 | tee -a /tmp/native-build.log
            verify_code=${PIPESTATUS[0]}
            if [ "${verify_code}" != "0" ]; then
              exit_code=${verify_code}
            fi
          fi

          if [ "${exit_code}" = "0" ] && [ "${REQUIRE_SIGNED}" = "true" ]; then
            signed="$(python -c 'import json; print(str(json.load(open("release-artifacts.json"))["releaseAab"]["signed"]).lower())')"
            if [ "${signed}" != "true" ]; then
              echo "Signed release was required, but permanent signing secrets were unavailable or invalid." \
                | tee -a /tmp/native-build.log
              exit_code=1
            fi
          fi

          {
            echo "=== RELEASE SIGNING CONFIGURED ==="
            echo "${{ steps.signing.outputs.configured }}"
            echo
            echo "=== ACTIONABLE ERROR LINES ==="
            grep -n -E "(^e: |FAILURE:|What went wrong:|Script compilation error|Unresolved reference|Could not|Exception is:|error:|Release verification failed:)" \
              /tmp/native-build.log | head -n 220 || true
            echo
            echo "=== FIRST FAILURE CONTEXT ==="
            first_line="$(grep -n -m1 -E "(^e: |FAILURE:|What went wrong:|Script compilation error|Unresolved reference|Could not|error:|Release verification failed:)" \
              /tmp/native-build.log | cut -d: -f1)"
            if [ -n "${first_line}" ]; then
              start=$(( first_line > 30 ? first_line - 30 : 1 ))
              end=$(( first_line + 100 ))
              sed -n "${start},${end}p" /tmp/native-build.log
            else
              head -n 220 /tmp/native-build.log
            fi
            echo
            echo "=== FINAL 100 LINES ==="
            tail -n 100 /tmp/native-build.log
          } > ../.github/native-ci-log.txt

          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload v1.0 release candidate artifacts
        if: steps.native_build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-native-v1.0.0-rc1
          path: |
            native/androidApp/build/outputs/apk/debug/androidApp-debug.apk
            native/androidApp/build/outputs/bundle/release/androidApp-release.aab
            native/androidApp/build/outputs/mapping/release/mapping.txt
            native/release-artifacts.json
          if-no-files-found: error
          retention-days: 14

      - name: Record native CI result
        if: always()
        working-directory: .
        env:
          BUILD_EXIT_CODE: ${{ steps.native_build.outputs.exit_code }}
        shell: bash
        run: |
          if [ "${BUILD_EXIT_CODE}" = "0" ]; then result="success"; else result="failure"; fi
          cat > .github/native-ci-status.json <<JSON
          {
            "status": "${result}",
            "runId": "${GITHUB_RUN_ID}",
            "commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "workflow": "native-foundation-ci",
            "milestone": "release-candidate-v1.0.0-rc1",
            "releaseSigningConfigured": "${{ steps.signing.outputs.configured }}"
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/native-ci-status.json .github/native-ci-log.txt
          git commit -m "chore(native): record v1.0 RC CI ${result}" || exit 0
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Fail when native release-candidate build failed
        if: steps.native_build.outputs.exit_code != '0'
        run: exit 1
