name: Native foundation CI

on:
  push:
    branches: [main]
    paths:
      - "native/**"
      - ".github/workflows/native-foundation-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-and-shared:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
      - name: Run shared tests and compile Android
        run: gradle :shared:testAndroidHostTest :androidApp:assembleDebug --stacktrace
      - name: Upload native debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jamals-finance-native-foundation-debug
          path: native/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          if-no-files-found: error
          retention-days: 7
