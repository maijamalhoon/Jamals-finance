name: Finalize JALVORO icon source cleanup

on:
  push:
    branches:
      - agent/jalvoro-icon-source-cleanup
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: jalvoro-icon-source-cleanup
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'agent/jalvoro-icon-source-cleanup')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/jalvoro-icon-source-cleanup
          persist-credentials: true
          fetch-depth: 0
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install current dependencies and generate migration input
        run: npm ci --silent

      - name: Rewrite source imports and remove temporary runtime
        run: node scripts/finalize-jalvoro-icon-source-cleanup.mjs

      - name: Preserve legacy prop typing and make zero-LUCIDE contract self-safe
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const compatFile = 'components/icons/jalvoro/compat.tsx';
          let compat = fs.readFileSync(compatFile, 'utf8');
          compat = compat.replace(
            'import { forwardRef } from "react";',
            'import { forwardRef, type ForwardRefExoticComponent, type RefAttributes } from "react";',
          );
          compat = compat.replace(
            'type CompatibleIconProps = JalvoroIconProps & {\n  absoluteStrokeWidth?: boolean;\n};',
            'type CompatibleIconProps = JalvoroIconProps & {\n  absoluteStrokeWidth?: boolean;\n};\n\ntype CompatibleIconComponent = ForwardRefExoticComponent<\n  CompatibleIconProps & RefAttributes<SVGSVGElement>\n>;',
          );
          compat = compat.replace(
            '): JalvoroIconComponent {',
            '): CompatibleIconComponent {',
          );
          fs.writeFileSync(compatFile, compat, 'utf8');

          const testFile = 'components/icons/jalvoro/source-cleanup.test.ts';
          let source = fs.readFileSync(testFile, 'utf8');
          source = source.replace(
            'const root = process.cwd();',
            'const root = process.cwd();\nconst legacyPackage = ["lucide", "react"].join("-");\nconst legacySpecifier = new RegExp(`["\\\']${legacyPackage}(?:/[^"\\\']*)?["\\\']`);\nconst legacyAlias = `"${legacyPackage}":`;',
          );
          source = source.replace(
            '/["\']lucide-react(?:\\/[^"\']*)?["\']/.test(readFileSync(file, "utf8"))',
            'legacySpecifier.test(readFileSync(file, "utf8"))',
          );
          source = source.replace(
            'packageJson.dependencies?.["lucide-react"]',
            'packageJson.dependencies?.[legacyPackage]',
          );
          source = source.replace(
            'nextConfig).not.toContain(\'"lucide-react":\')',
            'nextConfig).not.toContain(legacyAlias)',
          );
          fs.writeFileSync(testFile, source, 'utf8');
          NODE

      - name: Refresh dependency lockfile without lifecycle scripts
        run: npm install --package-lock-only --ignore-scripts --silent

      - name: Remove one-time migration machinery
        run: |
          rm -f .github/workflows/finalize-jalvoro-icon-source-cleanup.yml
          rm -f scripts/finalize-jalvoro-icon-source-cleanup.mjs

      - name: Install final dependency graph
        run: npm ci --ignore-scripts --silent

      - name: Verify no Lucide source or package dependency remains
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const ignored = new Set(['.git', '.next', '.vercel', 'build', 'coverage', 'design of  UI', 'node_modules', 'out']);
          const extensions = new Set(['.js', '.jsx', '.mjs', '.cjs', '.ts', '.tsx']);
          const legacyPackage = ['lucide', 'react'].join('-');
          const legacySpecifier = new RegExp(`["']${legacyPackage}(?:/[^"']*)?["']`);
          const offenders = [];
          function walk(directory) {
            for (const entry of fs.readdirSync(directory)) {
              if (ignored.has(entry)) continue;
              const absolute = path.join(directory, entry);
              const stat = fs.statSync(absolute);
              if (stat.isDirectory()) walk(absolute);
              else if (extensions.has(path.extname(entry))) {
                const source = fs.readFileSync(absolute, 'utf8');
                if (legacySpecifier.test(source)) offenders.push(path.relative(process.cwd(), absolute));
              }
            }
          }
          walk(process.cwd());
          if (offenders.length) {
            console.error('Third-party icon module specifiers remain:', offenders);
            process.exit(1);
          }
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const packageLock = fs.readFileSync('package-lock.json', 'utf8');
          if (packageJson.dependencies?.[legacyPackage] || packageLock.includes(`node_modules/${legacyPackage}`)) {
            console.error('Third-party icon dependency remains in package metadata.');
            process.exit(1);
          }
          NODE

      - name: Enforce zero known dependency vulnerabilities
        run: npm audit --audit-level=low

      - name: Lint
        run: npm run lint

      - name: Typecheck with diagnostics
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee /tmp/jalvoro-typecheck.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload typecheck diagnostics
        if: steps.typecheck.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: jalvoro-source-cleanup-typecheck
          path: /tmp/jalvoro-typecheck.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail when typecheck failed
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1

      - name: Run complete application suite
        run: npm test

      - name: Build production application
        run: npm run build

      - name: Commit validated direct-source migration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(icons): finalize JALVORO source migration"
          git push origin HEAD:agent/jalvoro-icon-source-cleanup
