name: Android Build Tools Handoff

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/android-build-tools-handoff.yml"

permissions:
  contents: write

jobs:
  handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and verify official Android Build-Tools 36
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            https://dl.google.com/android/repository/build-tools_r36_linux.zip \
            --output build-tools_r36_linux.zip
          echo "b0b6376977657e8ad9b969bacf4093601da2c6fb  build-tools_r36_linux.zip" | sha1sum --check
          unzip -l build-tools_r36_linux.zip | grep -E '(^|/)zipalign$|(^|/)apksigner$|lib/apksigner.jar'

      - name: Upload connector artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build-tools-36-handoff
          path: build-tools_r36_linux.zip
          if-no-files-found: error
          retention-days: 1

      - name: Report artifact run ID
        run: |
          mkdir -p android-twa/build-output
          cat > android-twa/build-output/build-tools-handoff.json <<JSON
          {
            "status": "completed",
            "runId": "${GITHUB_RUN_ID}",
            "artifactName": "android-build-tools-36-handoff",
            "sourceCommit": "${GITHUB_SHA}"
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-twa/build-output/build-tools-handoff.json
          git commit -m "chore(android): record build tools handoff" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
