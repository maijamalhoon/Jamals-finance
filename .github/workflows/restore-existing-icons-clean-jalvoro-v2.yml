name: Finalize original UI icon restoration

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: restore-existing-icons-clean-jalvoro-v2
  cancel-in-progress: false

jobs:
  restore:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/restore-existing-icons-clean-jalvoro'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out restoration branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/restore-existing-icons-clean-jalvoro
          persist-credentials: true
          fetch-depth: 0
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Restore established workspace icons
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const ignored = new Set(['.git', '.next', '.vercel', 'build', 'coverage', 'design of  UI', 'node_modules', 'out']);
          const extensions = new Set(['.js', '.jsx', '.mjs', '.cjs', '.ts', '.tsx']);
          let changed = 0;
          function walk(directory) {
            for (const entry of fs.readdirSync(directory)) {
              if (ignored.has(entry)) continue;
              const absolute = path.join(directory, entry);
              const stat = fs.statSync(absolute);
              if (stat.isDirectory()) walk(absolute);
              else if (extensions.has(path.extname(entry))) {
                const before = fs.readFileSync(absolute, 'utf8');
                const after = before
                  .replaceAll('"@/components/icons/jalvoro/compat"', '"lucide-react"')
                  .replaceAll("'@/components/icons/jalvoro/compat'", "'lucide-react'");
                if (after !== before) {
                  fs.writeFileSync(absolute, after, 'utf8');
                  changed += 1;
                }
              }
            }
          }
          walk(process.cwd());
          console.log(`Restored ${changed} workspace source files.`);
          NODE

          git checkout ae0a5078ce275d8b2fc2de6ac25d34640b0fd95a^ -- lib/navigation.ts

          rm -f components/icons/jalvoro/compat.tsx
          rm -f components/icons/jalvoro/source-cleanup.test.ts
          rm -f components/icons/jalvoro/lucide-runtime-contract.test.ts
          rm -f components/icons/jalvoro/lucide-runtime.generated.tsx
          rm -f scripts/generate-jalvoro-lucide-runtime.mjs
          rm -f lib/jalvoro-icon-generator-runtime.test.ts
          rm -f docs/jalvoro-full-workspace-migration.md
          rm -f docs/jalvoro-icon-source-cleanup-report.md

      - name: Restore dependency and isolate JALVORO library
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const packagePath = 'package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.dependencies = packageJson.dependencies ?? {};
          packageJson.dependencies['lucide-react'] = '^1.23.0';
          packageJson.dependencies = Object.fromEntries(
            Object.entries(packageJson.dependencies).sort(([a], [b]) => a.localeCompare(b)),
          );
          delete packageJson.scripts?.['generate:icons'];
          delete packageJson.scripts?.postinstall;
          if (packageJson.scripts?.predev === 'npm run generate:icons') delete packageJson.scripts.predev;
          if (packageJson.scripts?.prebuild === 'npm run generate:icons') delete packageJson.scripts.prebuild;
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`, 'utf8');

          const corePath = 'components/icons/jalvoro/core.tsx';
          let core = fs.readFileSync(corePath, 'utf8');
          core = core.replace(
            '(accentOverride ?? definition.defaultAccent)',
            '(accentOverride ?? "none")',
          );
          fs.writeFileSync(corePath, core, 'utf8');

          const definitionsDir = 'components/icons/jalvoro/definitions';
          for (const entry of fs.readdirSync(definitionsDir)) {
            if (!entry.endsWith('.ts')) continue;
            const file = path.join(definitionsDir, entry);
            const before = fs.readFileSync(file, 'utf8');
            fs.writeFileSync(
              file,
              before.replace(/defaultAccent:\s*"(?:wave|zigzag|subtle)"/g, 'defaultAccent: "none"'),
              'utf8',
            );
          }
          NODE

          cat > components/icons/jalvoro/README.md <<'EOF'
          # JALVORO Icons

          First-party icon design laboratory for JALVORO. The library is intentionally isolated from the current product UI.

          ## Clean default

          - 24×24 source grid
          - thin rounded outline
          - `currentColor` only
          - one clear object; two only when meaning requires it
          - no automatic wave, zigzag, sparkle, or decorative inner line
          - no generic fallback for unrelated concepts
          - readable at 16, 20, 24, and 32 pixels

          Existing application screens keep their established icons, sizes, colors, classes, spacing, hover states, and active states. A JALVORO icon enters the product only after individual visual approval.

          Micro-accents remain available only through an explicit prop in isolated design previews. They never render by default.
          EOF

          cat > docs/jalvoro-icon-system.md <<'EOF'
          # JALVORO Icon System — Clean Design Standard

          Status: isolated design system; not connected to the existing workspace UI.

          ## Rules

          1. One immediately recognizable object or concept.
          2. Maximum two directly related objects when necessary.
          3. Clean outer silhouette before internal detail.
          4. No default wave, zigzag, sparkle, or decorative inner stroke.
          5. Rounded line caps and joins.
          6. Thin, balanced stroke with small-size readability.
          7. `currentColor`; no embedded product colors.
          8. No generic fallback icon for a specific category.
          9. Inspect every symbol at 16, 20, 24, and 32 pixels.
          10. No workspace-wide replacement without explicit visual approval.

          Wave, zigzag, and subtle accents are experimental preview options only. Production defaults to `none`.

          Existing screens continue to use their established icon source. Package aliases, compatibility fallbacks, and repository-wide icon codemods are prohibited without explicit approval.
          EOF

          cat > components/icons/jalvoro/clean-defaults.test.tsx <<'EOF'
          import { renderToStaticMarkup } from "react-dom/server";
          import { describe, expect, it } from "vitest";

          import { JALVORO_ICON_DEFINITIONS } from "./definitions";
          import { JalvoroIcon } from "./JalvoroIcon";
          import { JALVORO_ICON_NAMES } from "./manifest";

          describe("JALVORO clean defaults", () => {
            it("renders every icon without a default micro-accent", () => {
              for (const name of JALVORO_ICON_NAMES) {
                const markup = renderToStaticMarkup(<JalvoroIcon name={name} />);
                expect(markup).toContain('data-jalvoro-accent="none"');
                expect(markup).not.toContain("data-jalvoro-micro-accent");
              }
            });

            it("keeps all definition defaults clean", () => {
              for (const definition of JALVORO_ICON_DEFINITIONS) {
                expect(definition.defaultAccent).toBe("none");
              }
            });
          });
          EOF

      - name: Remove one-time workflow files
        run: |
          rm -f .github/workflows/restore-existing-icons-clean-jalvoro.yml
          rm -f .github/workflows/restore-existing-icons-clean-jalvoro-v2.yml

      - name: Refresh and install dependency graph
        run: |
          npm install --package-lock-only --ignore-scripts --silent
          npm ci --ignore-scripts --silent

      - name: Verify exact rollback and clean defaults
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const ignored = new Set(['.git', '.next', '.vercel', 'build', 'coverage', 'design of  UI', 'node_modules', 'out']);
          const extensions = new Set(['.js', '.jsx', '.mjs', '.cjs', '.ts', '.tsx']);
          const compatOffenders = [];
          let establishedImports = 0;

          function walk(directory) {
            for (const entry of fs.readdirSync(directory)) {
              if (ignored.has(entry)) continue;
              const absolute = path.join(directory, entry);
              const stat = fs.statSync(absolute);
              if (stat.isDirectory()) walk(absolute);
              else if (extensions.has(path.extname(entry))) {
                const source = fs.readFileSync(absolute, 'utf8');
                if (source.includes('@/components/icons/jalvoro/compat')) compatOffenders.push(absolute);
                if (/(?:from\s+|import\s*\()\s*["']lucide-react["']/.test(source)) establishedImports += 1;
              }
            }
          }
          walk(process.cwd());

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const navigation = fs.readFileSync('lib/navigation.ts', 'utf8');
          const core = fs.readFileSync('components/icons/jalvoro/core.tsx', 'utf8');
          const failures = [];
          if (compatOffenders.length) failures.push(`compat imports: ${compatOffenders.join(', ')}`);
          if (!packageJson.dependencies?.['lucide-react']) failures.push('lucide dependency missing');
          if (!navigation.includes('from "lucide-react"')) failures.push('navigation icons not restored');
          if (fs.existsSync('components/icons/jalvoro/compat.tsx')) failures.push('compatibility file remains');
          if (!core.includes('(accentOverride ?? "none")')) failures.push('clean default not enforced');
          if (establishedImports < 20) failures.push(`only ${establishedImports} established icon imports found`);
          if (failures.length) {
            console.error(failures.join('\n'));
            process.exit(1);
          }
          console.log(`Verified ${establishedImports} established icon source files.`);
          NODE

      - name: Enforce zero known dependency vulnerabilities
        run: npm audit --audit-level=low

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run complete application suite
        run: npm test

      - name: Build production application
        run: npm run build

      - name: Commit validated restoration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore existing UI icons and clean JALVORO defaults"
          git push origin HEAD:agent/restore-existing-icons-clean-jalvoro
