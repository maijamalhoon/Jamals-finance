name: Apply portfolio donut tooltip patch

on:
  push:
    branches: [main]
    paths:
      - ".github/scripts/patch-portfolio-donut-tooltip.mjs"
      - ".github/workflows/apply-portfolio-donut-tooltip.yml"

permissions:
  contents: write

concurrency:
  group: apply-portfolio-donut-tooltip-main
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply focused portfolio donut update
        run: node .github/scripts/patch-portfolio-donut-tooltip.mjs

      - name: Validate changed component
        run: |
          git diff --check
          npm ci --no-audit --no-fund
          npx eslint components/dashboard/InvestmentOverviewWidget.tsx

      - name: Commit update and remove patch helpers
        run: |
          rm .github/scripts/patch-portfolio-donut-tooltip.mjs
          rm .github/workflows/apply-portfolio-donut-tooltip.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add components/dashboard/InvestmentOverviewWidget.tsx
          git add -u \
            .github/scripts/patch-portfolio-donut-tooltip.mjs \
            .github/workflows/apply-portfolio-donut-tooltip.yml

          git commit -m "Fix portfolio donut heading and tooltip placement"
          git push origin HEAD:main
