name: Verify approvals once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-approvals-once.yml

permissions:
  contents: write

concurrency:
  group: verify-approvals-once
  cancel-in-progress: false

jobs:
  validate:
    if: github.event.head_commit.message == 'ci(approvals): verify controls module'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: "false"
    steps:
      - name: Check out verified commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          package-manager-cache: true

      - name: Install dependencies
        run: npm ci --silent

      - name: Validate source
        run: npm run check

      - name: Build production application
        run: npm run build

      - name: Check repository diff
        run: git diff --check

      - name: Record success and remove one-time workflow
        shell: bash
        run: |
          mkdir -p docs/verification
          cat > docs/verification/approvals-controls-2026-07-23.md <<EOF
          # Approvals & Controls Verification

          Verified commit: \`${GITHUB_SHA}\`

          Passed in GitHub Actions on July 23, 2026:
          - \`npm ci --silent\`
          - \`npm run check\`
          - \`npm run build\`
          - \`git diff --check\`

          Scope: business approvals UI, routing, permissions, migration contracts, maker-checker controls, branch isolation, least-privilege directory exposure, and locked approval authority.
          EOF
          rm .github/workflows/verify-approvals-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/verification/approvals-controls-2026-07-23.md .github/workflows/verify-approvals-once.yml
          git commit -m "chore(approvals): record controls CI success"
          git pull --rebase origin main
          git push origin HEAD:main
