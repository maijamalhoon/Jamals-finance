name: Apply dashboard empty-state unification

on:
  push:
    paths:
      - ".github/workflows/apply-dashboard-empty-state-unification.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply focused empty-state changes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Expected block not found in {path}: {old[:100]!r}")
              file.write_text(text.replace(old, new, 1))

          income_chart = "components/dashboard/IncomeExpenseChart.tsx"
          replace_once(
              income_chart,
              '''import { useCurrency } from "@/components/currency/CurrencyProvider";
          import { chartMotion } from "@/components/motion/animation-config";
          import ChartFrame from "@/components/ui/chart-frame";''',
              '''import AddIncomeButton from "@/components/income/AddIncomeButton";
          import { useCurrency } from "@/components/currency/CurrencyProvider";
          import { chartMotion } from "@/components/motion/animation-config";
          import ChartFrame from "@/components/ui/chart-frame";
          import EmptyState from "@/components/ui/empty-state";''',
          )
          replace_once(
              income_chart,
              '''        <div
                    aria-label="Cash-flow range"''',
              '''        {status === "available" && hasCashFlow ? (
                    <div
                    aria-label="Cash-flow range"''',
          )
          replace_once(
              income_chart,
              '''        </div>
                </div>

                <p className="sr-only">''',
              '''          </div>
                  ) : null}
                </div>

                <p className="sr-only">''',
          )
          replace_once(
              income_chart,
              '''          <div className="dashboard-chart-empty h-[190px] min-h-[190px] sm:h-[220px] sm:min-h-[220px]">
                      <div>
                        <span className="dashboard-chart-empty-icon">
                          <DollarSign size={16} />
                        </span>
                        <p className="text-xs font-semibold text-text-primary">
                          Cash flow unavailable
                        </p>
                        <p className="mt-1 text-[11px] text-text-secondary">
                          Refresh when your connection is stable.
                        </p>
                      </div>
                    </div>''',
              '''          <div className="dashboard-chart-empty h-[190px] min-h-[190px] sm:h-[220px] sm:min-h-[220px]">
                      <EmptyState
                        compact
                        title="Cash flow unavailable"
                        description="Refresh when your connection is stable."
                      />
                    </div>''',
          )
          replace_once(
              income_chart,
              '''          <div className="dashboard-chart-empty h-[190px] min-h-[190px] sm:h-[220px] sm:min-h-[220px]">
                      <div>
                        <span className="dashboard-chart-empty-icon">
                          <DollarSign size={16} />
                        </span>
                        <p className="text-xs font-semibold text-text-primary">
                          No cash flow yet
                        </p>
                        <p className="mt-1 text-[11px] text-text-secondary">
                          Income and expenses will appear here.
                        </p>
                      </div>
                    </div>''',
              '''          <div className="dashboard-chart-empty h-[190px] min-h-[190px] sm:h-[220px] sm:min-h-[220px]">
                      <EmptyState
                        compact
                        title="No transactions yet"
                        description="Add your first transaction to see income and expense trends here."
                        action={
                          <AddIncomeButton
                            label="Add a transaction"
                            showIcon={false}
                          />
                        }
                      />
                    </div>''',
          )

          investment = "components/dashboard/InvestmentOverviewWidget.tsx"
          replace_once(
              investment,
              'import { BriefcaseBusiness, Layers3, Package } from "lucide-react";',
              'import { BriefcaseBusiness, Layers3 } from "lucide-react";',
          )
          replace_once(
              investment,
              '''import DashboardCardViewLink from "@/components/dashboard/DashboardCardViewLink";
          import ChartFrame from "@/components/ui/chart-frame";''',
              '''import DashboardCardViewLink from "@/components/dashboard/DashboardCardViewLink";
          import AddInvestmentButton from "@/components/investments/AddInvestmentButton";
          import ChartFrame from "@/components/ui/chart-frame";
          import EmptyState from "@/components/ui/empty-state";''',
          )
          replace_once(investment, '? "No holdings yet"', '? "No investments yet"')
          replace_once(
              investment,
              '? "Add investments to see allocation."',
              '? "Add your first investment to see portfolio allocation here."',
          )
          replace_once(
              investment,
              '''        <DashboardCardViewLink
                    href="/dashboard/investments"
                    label="View all investments"
                  />''',
              '''        {allocationData.length > 0 ? (
                    <DashboardCardViewLink
                      href="/dashboard/investments"
                      label="View all investments"
                    />
                  ) : null}''',
          )
          replace_once(
              investment,
              '''        <div className="dashboard-chart-empty mt-5 min-h-[260px] flex-1">
                    <div>
                      <span className="dashboard-chart-empty-icon">
                        <Package size={16} />
                      </span>
                      <p className="text-xs font-semibold text-text-primary">
                        {emptyTitle}
                      </p>
                      <p className="mt-1 text-[11px] text-text-secondary">
                        {emptyDescription}
                      </p>
                    </div>
                  </div>''',
              '''        <div className="dashboard-chart-empty mt-5 min-h-[260px] flex-1">
                    <EmptyState
                      compact
                      title={emptyTitle}
                      description={emptyDescription}
                      action={
                        availability === "available" && investments.length === 0 ? (
                          <AddInvestmentButton
                            label="Add an investment"
                            showIcon={false}
                          />
                        ) : undefined
                      }
                    />
                  </div>''',
          )

          spend_record = "components/dashboard/SpendRecordWidget.tsx"
          replace_once(
              spend_record,
              '''import ChartCard from "@/components/dashboard/ChartCard";
          import ChartFrame from "@/components/ui/chart-frame";''',
              '''import ChartCard from "@/components/dashboard/ChartCard";
          import AddExpenseButton from "@/components/expenses/AddExpenseButton";
          import ChartFrame from "@/components/ui/chart-frame";
          import EmptyState from "@/components/ui/empty-state";''',
          )
          replace_once(
              spend_record,
              '''        <div className="pt-1">''',
              '''        {status === "unavailable" || hasSpendData ? (
                    <div className="pt-1">''',
          )
          replace_once(
              spend_record,
              '''        </div>

                {status === "unavailable" ? (''',
              '''          </div>
                  ) : null}

                  {status === "unavailable" ? (''',
          )
          replace_once(
              spend_record,
              '''          <div className="dashboard-chart-empty mt-4 h-[132px] min-h-[132px]">
                      <div>
                        <span className="dashboard-chart-empty-icon">
                          <Activity size={16} />
                        </span>
                        <p className="text-xs font-semibold text-text-primary">
                          Spend record unavailable
                        </p>
                        <p className="mt-1 text-[11px] text-text-secondary">
                          Refresh to try loading it again.
                        </p>
                      </div>
                    </div>''',
              '''          <div className="dashboard-chart-empty mt-4 h-[132px] min-h-[132px]">
                      <EmptyState
                        compact
                        title="Spend record unavailable"
                        description="Refresh to try loading it again."
                      />
                    </div>''',
          )
          replace_once(
              spend_record,
              '''          <div className="dashboard-chart-empty mt-4 h-[132px] min-h-[132px]">
                      <div>
                        <span className="dashboard-chart-empty-icon">
                          <Activity size={16} />
                        </span>
                        <p className="text-xs font-semibold text-text-primary">
                          No spend yet
                        </p>
                        <p className="mt-1 text-[11px] text-text-secondary">
                          This month is clear.
                        </p>
                      </div>
                    </div>''',
              '''          <div className="dashboard-chart-empty mt-4 h-[132px] min-h-[132px]">
                      <EmptyState
                        compact
                        title="No expenses yet"
                        description="Add your first expense to see spending trends here."
                        action={
                          <AddExpenseButton
                            label="Add an expense"
                            showIcon={false}
                          />
                        }
                      />
                    </div>''',
          )

          replace_once(
              "components/dashboard/SpendingBreakdown.tsx",
              '                : "No expenses this month"',
              '                : "No expenses yet"',
          )
          replace_once(
              "components/dashboard/SpendingBreakdown.tsx",
              '                : "Add an expense to see your spending categories here."',
              '                : "Add your first expense to see spending categories here."',
          )
          replace_once(
              "components/dashboard/GoalsProgress.tsx",
              '              : "Create a goal to track your savings progress here."',
              '              : "Create your first goal to see savings progress here."',
          )
          replace_once(
              "components/dashboard/RecentTransactions.tsx",
              '                : "Your recent account activity will appear here."',
              '                : "Add your first transaction to see recent account activity here."',
          )

          workflow = Path(".github/workflows/apply-dashboard-empty-state-unification.yml")
          workflow.unlink()
          PY

      - name: Commit unified dashboard empty states
        shell: bash
        run: |
          git config user.name "Jamal Yaqoob"
          git config user.email "150429791+maijamalhoon@users.noreply.github.com"
          git add -A
          git commit -m "Unify dashboard empty-state actions"
          git push origin HEAD:main
