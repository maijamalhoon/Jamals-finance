name: Banking build verification

on:
  push:
    branches:
      - agent/banking-reconciliation-build-verify
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Apply exact nullable reconciliation guard to main
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("components/business/BusinessBankingWorkspace.tsx")
          source = path.read_text()
          old = '{reconciliation?.status !== "draft" ? ('
          new = '{reconciliation && reconciliation.status !== "draft" ? ('
          if old in source:
              path.write_text(source.replace(old, new, 1))
          PY
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add components/business/BusinessBankingWorkspace.tsx
            git commit -m "fix(banking): guard optional reconciliation details"
            git push origin HEAD:main
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js application
        run: npm run build
