name: Banking build verification

on:
  push:
    branches:
      - agent/banking-reconciliation-build-verify
    paths-ignore:
      - banking-github-build-result.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: build-verification-placeholder
      NEXT_PUBLIC_SITE_URL: https://jamals-finance-sable.vercel.app
    steps:
      - name: Checkout latest main source
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          path: source
      - name: Add Banking permission controls to Team UI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("source/components/business/BusinessTeamManager.tsx")
          source = path.read_text()
          if 'label: "Banking"' not in source:
              marker = '  {\n    label: "Contacts & sales",'
              banking = '''  {
    label: "Banking",
    permissions: [
      ["banking.view", "View banking"],
      ["banking.manage", "Manage banking and reconciliation"],
    ],
  },
'''
              if marker not in source:
                  raise SystemExit("Banking permission insertion marker not found")
              source = source.replace(marker, banking + marker, 1)
          accountant_old = 'if (role === "accountant") return ["accounting.manage", "purchases.manage", "purchases.pay", "reports.view"];'
          accountant_new = 'if (role === "accountant") return ["accounting.manage", "banking.manage", "purchases.manage", "purchases.pay", "reports.view"];'
          viewer_old = 'if (role === "viewer") return ["accounting.view", "reports.view"];'
          viewer_new = 'if (role === "viewer") return ["accounting.view", "banking.view", "reports.view"];'
          if accountant_old in source:
              source = source.replace(accountant_old, accountant_new, 1)
          if viewer_old in source:
              source = source.replace(viewer_old, viewer_new, 1)
          path.write_text(source)
          PY
          cd source
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add components/business/BusinessTeamManager.tsx
            git commit -m "feat(banking): expose banking team permissions"
            git push origin HEAD:main
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/package-lock.json
      - name: Install dependencies
        working-directory: source
        run: npm ci
      - name: Build Next.js application
        id: application_build
        continue-on-error: true
        working-directory: source
        run: npm run build > ../banking-build.log 2>&1
      - name: Checkout verification report branch
        if: always()
        uses: actions/checkout@v4
        with:
          ref: agent/banking-reconciliation-build-verify
          fetch-depth: 1
          path: report
      - name: Record build result
        if: always()
        shell: bash
        run: |
          main_sha=$(git -C source rev-parse HEAD)
          {
            echo "status=${{ steps.application_build.outcome }}"
            echo "main_sha=${main_sha}"
            echo "verified_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "--- build log tail ---"
            tail -n 200 banking-build.log 2>/dev/null || true
          } > report/banking-github-build-result.txt
          cd report
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add banking-github-build-result.txt
          if ! git diff --cached --quiet; then
            git commit -m "ci(banking): record latest main build result"
            git push origin HEAD:agent/banking-reconciliation-build-verify
          fi
      - name: Enforce successful build
        if: steps.application_build.outcome != 'success'
        run: exit 1
